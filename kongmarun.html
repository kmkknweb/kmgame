<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>โคมหลบหลุม</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{overflow:hidden;font-family:'Kanit',sans-serif;background:#030610;width:100vw;height:100vh;touch-action:none;user-select:none;}
#gameCanvas{position:absolute;inset:0;width:100%;height:100%;}

#hud{position:absolute;top:0;left:0;width:100%;z-index:20;padding:12px 14px;display:none;
  flex-direction:row;justify-content:space-between;align-items:center;pointer-events:none;}
.hb{background:rgba(0,0,0,0.6);color:#fff;padding:9px 14px;border-radius:14px;
  backdrop-filter:blur(10px);font-size:14px;font-weight:700;
  border:1px solid rgba(255,200,80,0.2);}
.hb span{color:#ffd54f;font-size:15px;}

#livesBar{position:absolute;top:58px;left:14px;z-index:20;
  display:none;font-size:24px;letter-spacing:2px;
  text-shadow:0 0 8px rgba(255,0,0,0.6);}

#lantern{position:absolute;z-index:30;pointer-events:none;display:none;
  width:60px;height:60px;transform:translate(-50%,-50%);
  filter:drop-shadow(0 0 16px rgba(255,180,0,1)) drop-shadow(0 0 32px rgba(255,100,0,0.6));
  object-fit:contain;}
#lantern.blink{animation:blink .12s infinite alternate;}
@keyframes blink{from{opacity:1;}to{opacity:0.15;}}

#warn{position:absolute;inset:0;pointer-events:none;z-index:100;border:14px solid transparent;}
#warn.flash{animation:wf .4s ease-out forwards;}
@keyframes wf{0%{border-color:rgba(255,30,30,0.9);}100%{border-color:transparent;}}

.screen{position:absolute;inset:0;z-index:50;
  background:rgba(3,6,16,0.94);
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  color:#fff;text-align:center;padding:28px;backdrop-filter:blur(8px);}
.stitle{font-size:34px;font-weight:800;color:#ffd54f;
  text-shadow:0 0 28px rgba(255,200,50,0.8);margin-bottom:10px;line-height:1.2;}
.ssub{color:rgba(255,255,255,0.8);font-size:14px;line-height:2.1;margin-bottom:24px;}
.btn{border:none;border-radius:20px;padding:16px 38px;font-size:18px;
  font-family:'Kanit',sans-serif;font-weight:700;cursor:pointer;
  background:linear-gradient(135deg,#ffb300,#ff6000);color:#fff;
  box-shadow:0 8px 28px rgba(255,120,0,0.5);margin:6px;}
.btn:active{transform:scale(0.95);}
.bscore{font-size:62px;font-weight:800;color:#ffd54f;
  text-shadow:0 0 32px rgba(255,200,50,0.85);margin:8px 0;}
.bdetail{font-size:14px;color:rgba(255,255,255,0.68);line-height:2.3;margin-bottom:20px;}
.stars{font-size:40px;margin-bottom:6px;letter-spacing:4px;}

#lvlBanner{position:absolute;inset:0;z-index:45;pointer-events:none;
  display:flex;justify-content:center;align-items:center;
  opacity:0;transition:opacity .1s;}
#lvlBanner.show{animation:lvlPop 1.2s ease-out forwards;}
@keyframes lvlPop{
  0%  {opacity:0;transform:scale(0.5);}
  20% {opacity:1;transform:scale(1.1);}
  60% {opacity:1;transform:scale(1);}
  100%{opacity:0;transform:scale(1);}
}
#lvlText{font-size:48px;font-weight:800;color:#ffd54f;
  text-shadow:0 0 40px rgba(255,200,0,1);font-family:'Kanit',sans-serif;}
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="hud">
  <div class="hb">🏮 <span id="scoreEl">0</span></div>
  <div class="hb">⚡ x<span id="multEl">1.0</span></div>
  <div class="hb">🏆 <span id="bestEl">0</span></div>
</div>
<div id="livesBar">❤️❤️❤️</div>

<img id="lantern" src="images/khomjiw-open-eye.png" alt="โคม" draggable="false"/>
<div id="warn"></div>

<div id="lvlBanner"><div id="lvlText">LEVEL 2</div></div>

<!-- START -->
<div class="screen" id="startScreen">
  <div style="font-size:58px;margin-bottom:10px;">🏮</div>
  <div class="stitle">โคมจิ๋วหลบหลุม</div>
  <div class="ssub">
    กดค้างที่โคม แล้ว<strong style="color:#ffd54f;">เลื่อนซ้าย-ขวา</strong>เพื่อหลบ<br>
    สิ่งกีดขวางเร็วขึ้นเรื่อยๆ<br>
    🕳️ หลุม &nbsp;|&nbsp; 🪨 หิน &nbsp;|&nbsp; ⚡ ฟ้าผ่า &nbsp;|&nbsp; 🌊 คลื่น<br>
    <strong style="color:#ff7070;">❤️ มี 3 ชีวิต</strong> — หมดแล้ว Game Over
  </div>
  <button class="btn" id="startBtn">🏮 เริ่มเลย!</button>
</div>

<!-- GAME OVER -->
<div class="screen" id="overScreen" style="display:none;">
  <div style="font-size:52px;margin-bottom:6px;">😢</div>
  <div class="stitle" style="color:#ff6060;">Game Over!</div>
  <div class="stars" id="overStars">⭐</div>
  <div class="bscore" id="overScore">0</div>
  <div class="bdetail" id="overDetail"></div>
  <button class="btn" id="retryBtn">🔄 เล่นอีกครั้ง</button>
</div>

<script>
// ============================================================
// AUDIO — Web Audio API (ไม่ต้องโหลดไฟล์)
// ============================================================
let AC = null;

function getAC(){
  if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended') AC.resume();
  return AC;
}

// เสียง tone สั้น
function tone(freq,type,dur,vol=0.25,delay=0){
  try{
    const ac=getAC(),o=ac.createOscillator(),g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type=type; o.frequency.value=freq;
    const t=ac.currentTime+delay;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t); o.stop(t+dur+0.05);
  }catch(e){}
}

// เสียง noise (กระแทก)
function noise(dur,vol=0.15){
  try{
    const ac=getAC(),sr=ac.sampleRate;
    const buf=ac.createBuffer(1,sr*dur,sr);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
    const src=ac.createBufferSource(),g=ac.createGain(),f=ac.createBiquadFilter();
    f.type='bandpass'; f.frequency.value=250; f.Q.value=1;
    src.buffer=buf; src.connect(f); f.connect(g); g.connect(ac.destination);
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+dur);
    src.start(); src.stop(ac.currentTime+dur+0.05);
  }catch(e){}
}

const SFX={
  hit(){ noise(0.2,0.25); tone(100,'sawtooth',0.2,0.3); },
  levelUp(){ [440,554,659,880].forEach((f,i)=>tone(f,'sine',0.18,0.22,i*0.09)); },
  gameOver(){ [330,277,220,165].forEach((f,i)=>tone(f,'sawtooth',0.35,0.3,i*0.13)); },
  start(){ [523,659,784].forEach((f,i)=>tone(f,'sine',0.2,0.22,i*0.1)); },
};

// ---- BGM ----
let bgmTimeout=null, bgmRunning=false, bgmGain=null;

function startBGM(){
  bgmRunning=true;
  try{
    const ac=getAC();
    if(!bgmGain){ bgmGain=ac.createGain(); bgmGain.gain.value=0.06; bgmGain.connect(ac.destination); }
    else bgmGain.gain.value=0.06;
  }catch(e){}
  scheduleBGM();
}

function scheduleBGM(){
  if(!bgmRunning) return;
  try{
    const ac=getAC();
    const scale=[220,247,262,294,330,349,392,440,494,523];
    let t=ac.currentTime+0.05;
    for(let i=0;i<10;i++){
      const f=scale[Math.floor(Math.random()*scale.length)]*(Math.random()>0.4?2:1);
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='sine'; o.frequency.value=f;
      o.connect(g); g.connect(bgmGain);
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.28,t+0.04);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.35);
      o.start(t); o.stop(t+0.4);
      t+=0.35+Math.random()*0.25;
    }
    bgmTimeout=setTimeout(scheduleBGM, 4000);
  }catch(e){}
}

function stopBGM(){
  bgmRunning=false;
  clearTimeout(bgmTimeout);
  bgmTimeout=null;
  try{
    if(bgmGain) bgmGain.gain.setTargetAtTime(0,AC.currentTime,0.2);
  }catch(e){}
}

// ============================================================
// CANVAS
// ============================================================
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
let W=0, H=0;

// ============================================================
// GAME STATE — ตัวแปรทั้งหมดรวมกัน
// ============================================================
let playing   = false;
let score     = 0;
let bestScore = 0;
let mult      = 1.0;
let lives     = 3;       // ❤️ จำนวนชีวิตจริง
let invincible= false;   // ระยะ invincible หลังโดน
let invEnd    = 0;       // timestamp ที่ invincible หมด

let gameSpeed    = 3.5;
let spawnTimer   = 0;
let spawnEvery   = 65;   // เฟรม
let frameCount   = 0;
let level        = 1;
let scrollOff    = 0;

let lx = 0;   // lantern X
let ly = 0;   // lantern Y

let dragging  = false;
let dragDX    = 0;       // offset ระหว่างนิ้วกับโคม

let obstacles  = [];
let particles  = [];
let floatTexts = [];

let bgStars    = [];
let bgLanterns = [];

let LANE_W = 0;
const N_LANES = 5;

// ============================================================
// ELEMENTS
// ============================================================
const lanternEl  = document.getElementById('lantern');
const warnEl     = document.getElementById('warn');
const hudEl      = document.getElementById('hud');
const livesEl    = document.getElementById('livesBar');
const scoreEl    = document.getElementById('scoreEl');
const multEl     = document.getElementById('multEl');
const bestEl     = document.getElementById('bestEl');
const startSc    = document.getElementById('startScreen');
const overSc     = document.getElementById('overScreen');
const lvlBanner  = document.getElementById('lvlBanner');
const lvlText    = document.getElementById('lvlText');

// ============================================================
// RESIZE
// ============================================================
function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  LANE_W=W/N_LANES;
  buildBg();
  if(!playing){ lx=W/2; ly=H*0.78; }
  moveLanternEl(lx,ly);
}

// ============================================================
// BACKGROUND BUILD
// ============================================================
function buildBg(){
  bgStars=Array.from({length:130},()=>({
    x:Math.random()*W, y:Math.random()*H,
    r:Math.random()*1.5+0.3,
    a:Math.random()*0.6+0.3,
    tw:Math.random()*3+1,
    vy:Math.random()*0.15+0.03
  }));
  bgLanterns=Array.from({length:15},()=>({
    x:Math.random()*W, y:Math.random()*H,
    size:Math.random()*16+10,
    alpha:Math.random()*0.18+0.06,
    vy:Math.random()*0.5+0.15,
    vx:Math.random()*0.3-0.15
  }));
}

// ============================================================
// DRAW BACKGROUND
// ============================================================
function drawBG(){
  // Sky
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#020510');
  g.addColorStop(0.45,'#091522');
  g.addColorStop(0.8,'#0c1c0a');
  g.addColorStop(1,'#111e06');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // Stars
  const t=Date.now()/1000;
  bgStars.forEach(s=>{
    s.y+=s.vy*(playing?gameSpeed*0.12:0.4);
    if(s.y>H){s.y=0;s.x=Math.random()*W;}
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${s.a*(0.55+0.45*Math.sin(t*s.tw))})`;
    ctx.fill();
  });

  // Moon
  const mx=W*0.83,my=H*0.11;
  ctx.save();
  const mg=ctx.createRadialGradient(mx,my,1,mx,my,42);
  mg.addColorStop(0,'rgba(255,252,200,0.95)');
  mg.addColorStop(0.6,'rgba(255,230,100,0.35)');
  mg.addColorStop(1,'rgba(255,200,50,0)');
  ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(mx,my,42,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,250,190,0.9)'; ctx.beginPath(); ctx.arc(mx,my,15,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // BG lanterns float up
  bgLanterns.forEach(l=>{
    l.y-=l.vy*(playing?gameSpeed*0.04:0.3);
    l.x+=l.vx;
    if(l.y<-30){l.y=H+20;l.x=Math.random()*W;}
    ctx.save(); ctx.globalAlpha=l.alpha;
    ctx.font=`${l.size}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🏮',l.x,l.y);
    ctx.restore();
  });

  // Road
  const rw=W*0.88, rx=(W-rw)/2;
  const rg=ctx.createLinearGradient(rx,0,rx+rw,0);
  rg.addColorStop(0,'rgba(0,0,0,0)');
  rg.addColorStop(0.12,'rgba(15,25,12,0.88)');
  rg.addColorStop(0.88,'rgba(15,25,12,0.88)');
  rg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=rg; ctx.fillRect(rx,0,rw,H);

  // Lane dashes
  scrollOff=(scrollOff+gameSpeed*0.85)%80;
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=2; ctx.setLineDash([28,52]);
  ctx.lineDashOffset=-scrollOff;
  for(let i=1;i<N_LANES;i++){
    ctx.beginPath(); ctx.moveTo(LANE_W*i,0); ctx.lineTo(LANE_W*i,H); ctx.stroke();
  }
  ctx.setLineDash([]); ctx.restore();

  // Edge glow
  ['left','right'].forEach(side=>{
    const gx=side==='left'?rx:rx+rw-50;
    const eg=ctx.createLinearGradient(gx,0,gx+50,0);
    if(side==='left'){ eg.addColorStop(0,'rgba(255,180,0,0)'); eg.addColorStop(1,'rgba(255,180,0,0.07)'); }
    else             { eg.addColorStop(0,'rgba(255,180,0,0.07)'); eg.addColorStop(1,'rgba(255,180,0,0)'); }
    ctx.fillStyle=eg; ctx.fillRect(gx,0,50,H);
  });

  // Ground
  const gg=ctx.createLinearGradient(0,H*0.86,0,H);
  gg.addColorStop(0,'rgba(15,40,8,0)'); gg.addColorStop(1,'rgba(8,22,4,0.96)');
  ctx.fillStyle=gg; ctx.fillRect(0,H*0.86,W,H*0.14);
}

// ============================================================
// OBSTACLES
// ============================================================
const OBS=[
  {e:'🕳️',w:56,h:32,dmg:1,lbl:'หลุม! -❤️',col:'rgba(80,40,0,0.5)'},
  {e:'🪨', w:52,h:52,dmg:1,lbl:'หิน! -❤️', col:'rgba(60,60,60,0.5)'},
  {e:'⚡', w:42,h:64,dmg:1,lbl:'ฟ้าผ่า! -❤️',col:'rgba(255,220,0,0.3)'},
  {e:'🌊', w:66,h:42,dmg:1,lbl:'คลื่น! -❤️',col:'rgba(0,80,180,0.4)'},
];

function spawnObs(){
  const lane=Math.floor(Math.random()*N_LANES);
  const x=LANE_W*lane+LANE_W/2;
  const t=OBS[Math.floor(Math.random()*OBS.length)];
  obstacles.push({
    x, y:-70,
    w:t.w*(0.85+Math.random()*0.3),
    h:t.h*(0.85+Math.random()*0.3),
    e:t.e, lbl:t.lbl, col:t.col,
    spd:gameSpeed*(0.88+Math.random()*0.28),
    phase:Math.random()*Math.PI*2
  });
}

function drawObs(){
  const t=Date.now()/1000;
  obstacles.forEach(ob=>{
    ob.y+=ob.spd;
    const wobX=Math.sin(t*2.5+ob.phase)*5;
    // Glow
    ctx.save();
    const og=ctx.createRadialGradient(ob.x+wobX,ob.y,4,ob.x+wobX,ob.y,ob.w*0.9);
    og.addColorStop(0,ob.col); og.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=og; ctx.beginPath(); ctx.arc(ob.x+wobX,ob.y,ob.w*0.9,0,Math.PI*2); ctx.fill();
    // Emoji
    ctx.font=`${ob.w*0.88}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(ob.e,ob.x+wobX,ob.y);
    ctx.restore();
  });
  obstacles=obstacles.filter(ob=>ob.y<H+90);
}

// ============================================================
// PARTICLES
// ============================================================
function burst(x,y,col,n=14){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=Math.random()*5+2;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,
      r:Math.random()*4+1.5,col,life:1});
  }
}
function drawParticles(){
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.life-=0.032;
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    ctx.fillStyle=p.col; ctx.fill(); ctx.restore();
  });
  particles=particles.filter(p=>p.life>0);
}

// ============================================================
// FLOAT TEXT
// ============================================================
function addFloat(x,y,txt,col='#ffd54f'){
  floatTexts.push({x,y,txt,col,life:1,vy:-1.8});
}
function drawFloats(){
  floatTexts.forEach(f=>{
    f.y+=f.vy; f.life-=0.022;
    ctx.save(); ctx.globalAlpha=Math.max(0,f.life);
    ctx.font=`bold ${18+Math.round(f.life*3)}px Kanit`;
    ctx.fillStyle=f.col; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(f.txt,f.x,f.y); ctx.restore();
  });
  floatTexts=floatTexts.filter(f=>f.life>0);
}

// ============================================================
// LANTERN GLOW
// ============================================================
function moveLanternEl(x,y){
  lx=x; ly=y;
  lanternEl.style.left=x+'px';
  lanternEl.style.top=y+'px';
}

function drawLanternGlow(){
  if(!playing) return;
  ctx.save();
  // Aura
  const ga=ctx.createRadialGradient(lx,ly,6,lx,ly,72);
  ga.addColorStop(0,'rgba(255,200,60,0.42)');
  ga.addColorStop(1,'rgba(255,80,0,0)');
  ctx.fillStyle=ga; ctx.beginPath(); ctx.arc(lx,ly,72,0,Math.PI*2); ctx.fill();
  // Beam
  const gb=ctx.createLinearGradient(lx,ly,lx,ly+110);
  gb.addColorStop(0,'rgba(255,200,50,0.18)');
  gb.addColorStop(1,'rgba(255,160,0,0)');
  ctx.fillStyle=gb;
  ctx.beginPath();
  ctx.moveTo(lx-10,ly); ctx.lineTo(lx+10,ly);
  ctx.lineTo(lx+28,ly+110); ctx.lineTo(lx-28,ly+110);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ============================================================
// COLLISION
// ============================================================
function checkCol(){
  if(!playing || invincible) return;

  for(let i=0;i<obstacles.length;i++){
    const ob=obstacles[i];
    const dx=Math.abs(lx-ob.x);
    const dy=Math.abs(ly-ob.y);
    if(dx < ob.w*0.44 && dy < ob.h*0.5){
      // ลบ obstacle นี้ออกก่อน
      obstacles.splice(i,1);
      // แล้วค่อย hit
      doHit(ob);
      return; // รับครั้งเดียวต่อเฟรม
    }
  }
}

function doHit(ob){
  // ลด life
  lives = lives - 1;

  // เอฟเฟกต์
  SFX.hit();
  burst(lx,ly,'#ff4444',18);
  addFloat(lx,ly-50,ob.lbl,'#ff5555');
  warnEl.classList.remove('flash');
  void warnEl.offsetWidth;
  warnEl.classList.add('flash');

  // reset multiplier
  mult=1.0;
  multEl.innerText=mult.toFixed(1);

  // อัปเดตหัวใจ
  updateLives();

  // ถ้าชีวิต <= 0 จบเกม
  if(lives<=0){
    // หยุดรับ input และ collision
    invincible=true;
    setTimeout(()=>{ endGame(); }, 700);
    return;
  }

  // invincible 2 วิ
  invincible=true;
  invEnd=Date.now()+2000;
  lanternEl.classList.add('blink');
  setTimeout(()=>{
    if(lives>0){ // ถ้ายังเล่นอยู่
      invincible=false;
      lanternEl.classList.remove('blink');
    }
  },2000);
}

function updateLives(){
  livesEl.innerText='❤️'.repeat(Math.max(0,lives))+'🖤'.repeat(Math.max(0,3-lives));
}

// ============================================================
// HUD UPDATE
// ============================================================
function updateHUD(){
  scoreEl.innerText=score;
  if(score>bestScore){ bestScore=score; bestEl.innerText=bestScore; }
}

// ============================================================
// SPEED UP
// ============================================================
function checkLevelUp(){
  // ทุก 200 เฟรม
  if(frameCount>0 && frameCount%200===0){
    gameSpeed=Math.min(13, gameSpeed+0.7);
    spawnEvery=Math.max(25, spawnEvery-5);
    level++;
    mult=Math.min(5.0, mult+0.3);
    multEl.innerText=mult.toFixed(1);
    SFX.levelUp();
    lvlText.innerText='LEVEL '+level+'  ⚡';
    lvlBanner.classList.remove('show');
    void lvlBanner.offsetWidth;
    lvlBanner.classList.add('show');
  }
}

// ============================================================
// MAIN LOOP
// ============================================================
function loop(){
  if(!playing){
    // ยังวาด bg ให้หน้าจอไม่ดำ
    drawBG();
    requestAnimationFrame(loop);
    return;
  }

  frameCount++;

  drawBG();
  drawObs();
  drawParticles();
  drawLanternGlow();
  drawFloats();

  // spawn
  spawnTimer++;
  if(spawnTimer>=spawnEvery){
    spawnTimer=0;
    spawnObs();
    if(gameSpeed>7 && Math.random()>0.55) spawnObs();
    // คะแนนทุก spawn
    score+=Math.round(5*mult);
    updateHUD();
  }

  checkLevelUp();
  checkCol();

  requestAnimationFrame(loop);
}

// ============================================================
// START / END
// ============================================================
function startGame(){
  // unlock audio
  getAC();

  // reset state
  score=0; mult=1.0; lives=3;
  invincible=false; invEnd=0;
  gameSpeed=3.5; spawnTimer=0; spawnEvery=65;
  frameCount=0; level=1; scrollOff=0;
  obstacles=[]; particles=[]; floatTexts=[];

  lx=W/2; ly=H*0.78;
  moveLanternEl(lx,ly);

  scoreEl.innerText='0';
  multEl.innerText='1.0';
  bestEl.innerText=bestScore;
  updateLives();

  hudEl.style.display='flex';
  livesEl.style.display='block';
  lanternEl.style.display='block';
  lanternEl.classList.remove('blink');

  startSc.style.display='none';
  overSc.style.display='none';

  playing=true;
  SFX.start();
  startBGM();
}

function endGame(){
  playing=false;

  // หยุดเสียงทันที
  stopBGM();

  // ซ่อน HUD
  hudEl.style.display='none';
  livesEl.style.display='none';
  lanternEl.style.display='none';
  lanternEl.classList.remove('blink');

  // เสียง game over
  SFX.gameOver();

  // แสดงผล
  document.getElementById('overScore').innerText=score;
  document.getElementById('overStars').innerText=
    score>=500?'⭐⭐⭐':score>=200?'⭐⭐':score>0?'⭐':'💀';
  document.getElementById('overDetail').innerHTML=
    `ด่านสูงสุด: ${level} &nbsp;|&nbsp; เบสสกอร์: ${bestScore}`;
  overSc.style.display='flex';
}

// ============================================================
// TOUCH / MOUSE
// ============================================================
function ptOf(e){ const t=e.touches?e.touches[0]:e; return{x:t.clientX,y:t.clientY}; }

canvas.addEventListener('touchstart',e=>{
  if(!playing) return;
  const p=ptOf(e);
  if(Math.hypot(p.x-lx,p.y-ly)<58){
    dragging=true;
    dragDX=p.x-lx;
    e.preventDefault();
  }
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  if(!playing||!dragging) return;
  e.preventDefault();
  const p=ptOf(e);
  const nx=Math.max(LANE_W*0.3, Math.min(W-LANE_W*0.3, p.x-dragDX));
  moveLanternEl(nx,ly);
},{passive:false});

canvas.addEventListener('touchend',()=>{ dragging=false; },{passive:true});

canvas.addEventListener('mousedown',e=>{
  if(!playing) return;
  const p=ptOf(e);
  if(Math.hypot(p.x-lx,p.y-ly)<58){ dragging=true; dragDX=p.x-lx; }
});
canvas.addEventListener('mousemove',e=>{
  if(!dragging||!playing) return;
  const nx=Math.max(LANE_W*0.3, Math.min(W-LANE_W*0.3, e.clientX-dragDX));
  moveLanternEl(nx,ly);
});
canvas.addEventListener('mouseup',()=>{ dragging=false; });

// ============================================================
// BUTTONS
// ============================================================
document.getElementById('startBtn').onclick=()=>{ startGame(); };
document.getElementById('retryBtn').onclick=()=>{ startGame(); };

// fallback emoji ถ้าไม่มีรูป
document.getElementById('lantern').onerror=function(){
  const fb=document.createElement('div');
  fb.id='lantern';
  fb.style.cssText='position:absolute;z-index:30;pointer-events:none;display:none;'
    +'width:60px;height:60px;transform:translate(-50%,-50%);'
    +'font-size:48px;line-height:60px;text-align:center;'
    +'filter:drop-shadow(0 0 16px rgba(255,180,0,1));';
  fb.innerText='🏮';
  this.replaceWith(fb);
};

// ============================================================
// INIT
// ============================================================
window.addEventListener('resize',resize);
resize();
loop();
</script>
