<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>เกมวิ่งโคม</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
body { overflow:hidden; font-family:'Kanit',sans-serif; background:#0a0e1a; width:100vw; height:100vh; touch-action:none; }
#gameCanvas { display:block; width:100vw; height:100vh; }
.top-ui { position:absolute; top:0; left:0; width:100%; z-index:20; padding:12px 14px; display:flex; justify-content:space-between; align-items:center; pointer-events:none; }
.ui-box { background:rgba(0,0,0,0.55); color:#fff; padding:9px 15px; border-radius:14px; backdrop-filter:blur(8px); font-size:14px; font-weight:600; box-shadow:0 4px 14px rgba(0,0,0,0.4); border:1px solid rgba(255,200,80,0.18); }
.ui-box span { color:#ffd54f; font-weight:700; }
#startScreen, #gameOverScreen { position:absolute; inset:0; z-index:50; background:rgba(5,10,25,0.88); display:flex; flex-direction:column; justify-content:center; align-items:center; color:#fff; text-align:center; padding:28px; backdrop-filter:blur(4px); }
.screen-title { font-size:36px; font-weight:800; color:#ffd54f; text-shadow:0 0 28px rgba(255,200,50,0.7); margin-bottom:10px; }
.screen-sub { color:rgba(255,255,255,0.82); font-size:15px; line-height:1.8; margin-bottom:30px; }
.btn { border:none; border-radius:18px; padding:15px 36px; font-size:18px; font-family:'Kanit',sans-serif; font-weight:700; cursor:pointer; background:linear-gradient(135deg,#ffb300,#ff6f00); color:#fff; box-shadow:0 8px 28px rgba(255,140,0,0.5); }
.result-score { font-size:56px; font-weight:800; color:#ffd54f; text-shadow:0 0 30px rgba(255,210,50,0.8); margin:8px 0 4px; }
.result-detail { font-size:15px; color:rgba(255,255,255,0.75); margin-bottom:28px; line-height:1.9; }
#warning { position:absolute; inset:0; pointer-events:none; z-index:100; border:10px solid transparent; }
#warning.flash { animation:warnFlash 0.35s ease-out forwards; }
@keyframes warnFlash { 0%{border-color:rgba(255,60,60,0.9);}100%{border-color:rgba(255,60,60,0);} }
#lantern { position:absolute; width:50px; height:50px; transform:translate(-50%,-50%); pointer-events:none; z-index:30; filter:drop-shadow(0 0 12px rgba(255,180,0,0.95)); display:none; border-radius:6px; object-fit:contain; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div class="top-ui" id="topUI" style="display:none;">
  <div class="ui-box">⏱ <span id="timeEl">0.0</span>s</div>
  <div class="ui-box">💯 <span id="scoreEl">100</span></div>
  <div class="ui-box">💥 ชน <span id="hitsEl">0</span></div>
</div>
<img id="lantern" src="images/khomjiw-open-eye.jpg" alt="โคม" draggable="false" />
<div id="warning"></div>
<div id="startScreen">
  <div class="screen-title">🏮 วิ่งโคมรอบบึง</div>
  <div class="screen-sub">ลากโคมวิ่งรอบบึงแก่นนครทวนเข็มนาฬิกา<br>ออกนอกเส้น = −5 คะแนน | คะแนนเต็ม 100</div>
  <button class="btn" id="startBtn">🏮 เริ่มวิ่ง</button>
</div>
<div id="gameOverScreen" style="display:none;">
  <div class="screen-title" id="goTitle">วิ่งสำเร็จ!</div>
  <div class="result-score" id="goScore">100</div>
  <div class="result-detail" id="goDetail"></div>
  <button class="btn" id="restartBtn">🔄 เล่นอีกครั้ง</button>
</div>
<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
let W,H,scaleF,trackPoints=[],outerPts=[],innerPts=[];
const ROAD_HW=0.052;

// Bueng Kaen Nakhon path - inner road boundary CCW from top
const rawC=[
  [0.500,0.040],[0.558,0.042],[0.615,0.050],[0.668,0.065],[0.718,0.086],
  [0.762,0.110],[0.798,0.142],[0.825,0.180],[0.842,0.223],[0.851,0.270],
  [0.854,0.318],[0.852,0.366],[0.848,0.414],[0.843,0.460],[0.836,0.505],
  [0.825,0.547],[0.808,0.585],[0.786,0.620],[0.758,0.651],[0.724,0.677],
  [0.684,0.698],[0.640,0.713],[0.593,0.721],[0.544,0.724],[0.495,0.722],
  [0.447,0.715],[0.402,0.702],[0.360,0.683],[0.323,0.659],[0.291,0.630],
  [0.265,0.597],[0.245,0.561],[0.231,0.522],[0.222,0.481],[0.217,0.438],
  [0.215,0.394],[0.216,0.350],[0.220,0.305],[0.228,0.262],[0.240,0.221],
  [0.256,0.183],[0.278,0.148],[0.305,0.118],[0.338,0.092],[0.375,0.071],
  [0.416,0.055],[0.458,0.045],[0.500,0.040]
];

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  scaleF=Math.min(W,H);
  buildTrack();
  drawScene();
  if(playing){setLanternPos(lanternPt.x,lanternPt.y);drawGlow();}
}

function catmull(pts,iter){
  let p=pts.slice(0,pts.length-1);
  for(let k=0;k<iter;k++){
    const n=[],len=p.length;
    for(let j=0;j<len;j++){
      const p0=p[(j-1+len)%len],p1=p[j],p2=p[(j+1)%len],p3=p[(j+2)%len];
      n.push(p1);
      n.push({x:(-p0.x+9*p1.x+9*p2.x-p3.x)/16,y:(-p0.y+9*p1.y+9*p2.y-p3.y)/16});
    }
    p=n;
  }
  return p;
}

function offset(pts,d){
  const n=pts.length;
  return pts.map((pt,i)=>{
    const prev=pts[(i-1+n)%n],next=pts[(i+1)%n];
    const tx=next.x-prev.x,ty=next.y-prev.y,l=Math.sqrt(tx*tx+ty*ty)||1;
    return{x:pt.x+(-ty/l)*d,y:pt.y+(tx/l)*d};
  });
}

function buildTrack(){
  const raw=rawC.map(([nx,ny])=>({x:nx*W,y:ny*H}));
  trackPoints=catmull(raw,5);
  const hw=ROAD_HW*scaleF;
  outerPts=offset(trackPoints,hw);
  innerPts=offset(trackPoints,-hw);
}

let stars=null;
function getStars(){
  if(!stars)stars=Array.from({length:70},()=>({x:Math.random(),y:Math.random()*0.5,r:Math.random()*1.4+0.3,a:Math.random()*0.7+0.3}));
  return stars;
}

function makePath(pts){
  if(!pts.length)return;
  ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);
  ctx.closePath();
}

function drawScene(){
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createRadialGradient(W/2,H*0.2,0,W/2,H*0.5,H*0.9);
  bg.addColorStop(0,'#1e3560');bg.addColorStop(0.6,'#0c1a30');bg.addColorStop(1,'#060b18');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  getStars().forEach(s=>{ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${s.a})`;ctx.fill();});

  // Water
  ctx.save();ctx.beginPath();makePath(innerPts);
  const wg=ctx.createRadialGradient(W*0.5,H*0.38,H*0.04,W*0.5,H*0.38,H*0.36);
  wg.addColorStop(0,'#5dd0f5');wg.addColorStop(0.45,'#0277bd');wg.addColorStop(1,'#013850');
  ctx.fillStyle=wg;ctx.fill();ctx.restore();

  // Road
  ctx.save();ctx.beginPath();makePath(outerPts);ctx.clip();
  ctx.beginPath();makePath(outerPts);ctx.fillStyle='#404040';ctx.fill();
  ctx.globalCompositeOperation='destination-out';ctx.beginPath();makePath(innerPts);ctx.fill();
  ctx.restore();

  ctx.save();ctx.beginPath();makePath(outerPts);ctx.strokeStyle='#2a2a2a';ctx.lineWidth=3;ctx.stroke();ctx.restore();
  ctx.save();ctx.beginPath();makePath(innerPts);ctx.strokeStyle='#0d4a6a';ctx.lineWidth=3;ctx.stroke();ctx.restore();
  ctx.save();ctx.beginPath();makePath(trackPoints);ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2;ctx.setLineDash([16,12]);ctx.stroke();ctx.setLineDash([]);ctx.restore();

  // Island
  ctx.save();ctx.beginPath();ctx.ellipse(W*0.49,H*0.15,W*0.066,H*0.05,-0.1,0,Math.PI*2);ctx.fillStyle='#2a5425';ctx.fill();ctx.strokeStyle='#1a3c18';ctx.lineWidth=2;ctx.stroke();ctx.restore();

  // Start marker
  const sp=trackPoints[0];
  ctx.save();ctx.beginPath();ctx.arc(sp.x,sp.y,11,0,Math.PI*2);ctx.fillStyle='#ffd54f';ctx.fill();ctx.strokeStyle='#e65100';ctx.lineWidth=3;ctx.stroke();ctx.restore();
  ctx.save();ctx.fillStyle='#000';ctx.font=`bold ${Math.round(scaleF*0.022)}px Kanit`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('S',sp.x,sp.y);ctx.restore();

  // Progress highlight
  if(playing&&trackProgress>0){
    const done=Math.floor(Math.min(trackProgress,1)*trackPoints.length);
    ctx.save();ctx.beginPath();ctx.moveTo(trackPoints[0].x,trackPoints[0].y);
    for(let i=1;i<=done&&i<trackPoints.length;i++)ctx.lineTo(trackPoints[i].x,trackPoints[i].y);
    ctx.strokeStyle='rgba(255,213,79,0.5)';ctx.lineWidth=ROAD_HW*scaleF*1.5;ctx.lineCap='round';ctx.stroke();ctx.restore();
  }
}

function drawGlow(){
  const x=lanternPt.x,y=lanternPt.y;
  ctx.save();
  const g=ctx.createRadialGradient(x,y,6,x,y,34);
  g.addColorStop(0,'rgba(255,200,50,0.4)');g.addColorStop(1,'rgba(255,140,0,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,34,0,Math.PI*2);ctx.fill();ctx.restore();
}

let playing=false,score=100,hits=0,elapsed=0,timerInt=null,lapDone=false,isDragging=false;
let lanternPt={x:0,y:0},lastIdx=0,totalProg=0,trackProgress=0;
const lanternEl=document.getElementById('lantern'),topUI=document.getElementById('topUI');
const timeEl=document.getElementById('timeEl'),scoreEl=document.getElementById('scoreEl'),hitsEl=document.getElementById('hitsEl');
const warnEl=document.getElementById('warning');

function setLanternPos(x,y){lanternEl.style.left=x+'px';lanternEl.style.top=y+'px';}
function closestIdx(x,y){let b=0,bd=Infinity;trackPoints.forEach((p,i)=>{const d=(p.x-x)**2+(p.y-y)**2;if(d<bd){bd=d;b=i;}});return b;}
function isOnRoad(x,y){const hw=ROAD_HW*scaleF,idx=closestIdx(x,y),cp=trackPoints[idx];return Math.hypot(x-cp.x,y-cp.y)<=hw*1.08;}
function snapRoad(x,y){const idx=closestIdx(x,y);return{...trackPoints[idx]};}

function getPt(e){const t=e.touches?e.touches[0]:e;return{x:t.clientX,y:t.clientY};}

canvas.addEventListener('touchstart',e=>{
  if(!playing)return;e.preventDefault();
  const p=getPt(e);if(Math.hypot(p.x-lanternPt.x,p.y-lanternPt.y)<65)isDragging=true;
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  if(!playing||!isDragging)return;e.preventDefault();const p=getPt(e);moveLantern(p.x,p.y);
},{passive:false});
canvas.addEventListener('touchend',()=>{isDragging=false;});
canvas.addEventListener('mousedown',e=>{if(!playing)return;const p=getPt(e);if(Math.hypot(p.x-lanternPt.x,p.y-lanternPt.y)<65)isDragging=true;});
canvas.addEventListener('mousemove',e=>{if(!playing||!isDragging)return;moveLantern(e.clientX,e.clientY);});
canvas.addEventListener('mouseup',()=>{isDragging=false;});

function moveLantern(x,y){
  if(!isOnRoad(x,y)){triggerHit();const s=snapRoad(x,y);lanternPt=s;}
  else lanternPt={x,y};
  const idx=closestIdx(lanternPt.x,lanternPt.y),n=trackPoints.length;
  let delta=idx-lastIdx;
  if(delta<-n/2)delta+=n;if(delta>n/2)delta-=n;
  if(delta>0)totalProg+=delta;
  lastIdx=idx;trackProgress=totalProg/n;
  setLanternPos(lanternPt.x,lanternPt.y);drawScene();drawGlow();
  if(trackProgress>=0.97&&!lapDone){lapDone=true;endGame(true);}
}

let lastHit=0;
function triggerHit(){
  const now=Date.now();if(now-lastHit<700)return;lastHit=now;
  hits++;score=Math.max(0,100-hits*5);
  hitsEl.innerText=hits;scoreEl.innerText=score;
  warnEl.classList.remove('flash');void warnEl.offsetWidth;warnEl.classList.add('flash');
}

function startGame(){
  document.getElementById('startScreen').style.display='none';
  document.getElementById('gameOverScreen').style.display='none';
  topUI.style.display='flex';
  score=100;hits=0;elapsed=0;lapDone=false;isDragging=false;totalProg=0;trackProgress=0;
  const sp=trackPoints[0];lanternPt={x:sp.x,y:sp.y};lastIdx=0;
  lanternEl.style.display='block';setLanternPos(lanternPt.x,lanternPt.y);
  scoreEl.innerText='100';hitsEl.innerText='0';timeEl.innerText='0.0';
  playing=true;clearInterval(timerInt);
  const t0=Date.now();timerInt=setInterval(()=>{elapsed=(Date.now()-t0)/1000;timeEl.innerText=elapsed.toFixed(1);},100);
  drawScene();drawGlow();
}

function endGame(success){
  playing=false;clearInterval(timerInt);lanternEl.style.display='none';topUI.style.display='none';
  document.getElementById('goTitle').innerText=success?'🏮 วิ่งสำเร็จ!':'😢 ยังไม่ครบรอบ';
  document.getElementById('goScore').innerText=score;
  document.getElementById('goDetail').innerHTML=`ใช้เวลา ${elapsed.toFixed(1)} วินาที<br>ชนขอบ ${hits} ครั้ง`;
  document.getElementById('gameOverScreen').style.display='flex';
}

document.getElementById('startBtn').onclick=startGame;
document.getElementById('restartBtn').onclick=startGame;
window.addEventListener('resize',resize);
resize();
</script>
</body>
</html>
