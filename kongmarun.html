<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>โคมหลบหลุม</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{overflow:hidden;font-family:'Kanit',sans-serif;background:#030610;width:100vw;height:100vh;touch-action:none;user-select:none;}
#gameCanvas{position:absolute;inset:0;width:100%;height:100%;}

/* HUD */
#hud{position:absolute;top:0;left:0;width:100%;z-index:20;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;pointer-events:none;display:none;}
.hb{background:rgba(0,0,0,0.55);color:#fff;padding:9px 14px;border-radius:14px;backdrop-filter:blur(10px);font-size:14px;font-weight:700;border:1px solid rgba(255,200,80,0.2);box-shadow:0 4px 16px rgba(0,0,0,0.4);}
.hb span{color:#ffd54f;font-size:16px;}

/* LIVES */
#livesBar{position:absolute;top:58px;left:14px;z-index:20;pointer-events:none;display:none;font-size:22px;letter-spacing:3px;}

/* LANE INDICATORS */
#laneHint{position:absolute;bottom:100px;left:0;width:100%;z-index:15;display:flex;justify-content:space-around;pointer-events:none;opacity:0;transition:opacity 1s;}

/* LANTERN */
#lantern{position:absolute;z-index:30;pointer-events:none;display:none;
  width:60px;height:60px;transform:translate(-50%,-50%);
  filter:drop-shadow(0 0 18px rgba(255,180,0,1)) drop-shadow(0 0 35px rgba(255,120,0,0.7));
  object-fit:contain;transition:left .08s ease-out;}
#lantern.hit{animation:hitFlash .5s ease-out;}
@keyframes hitFlash{0%,100%{filter:drop-shadow(0 0 18px rgba(255,180,0,1));}50%{filter:drop-shadow(0 0 30px rgba(255,0,0,1)) brightness(2);}}

/* WARNING */
#warn{position:absolute;inset:0;pointer-events:none;z-index:100;border:16px solid transparent;}
#warn.flash{animation:wf .4s ease-out forwards;}
@keyframes wf{0%{border-color:rgba(255,30,30,0.95);}100%{border-color:transparent;}}

/* SCREENS */
.screen{position:absolute;inset:0;z-index:50;background:rgba(3,6,16,0.94);display:flex;flex-direction:column;justify-content:center;align-items:center;color:#fff;text-align:center;padding:28px;backdrop-filter:blur(8px);}
.stitle{font-size:36px;font-weight:800;color:#ffd54f;text-shadow:0 0 32px rgba(255,200,50,0.85);margin-bottom:10px;line-height:1.2;}
.ssub{color:rgba(255,255,255,0.8);font-size:14px;line-height:2.1;margin-bottom:26px;}
.btn{border:none;border-radius:20px;padding:16px 38px;font-size:18px;font-family:'Kanit',sans-serif;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#ffb300,#ff6000);color:#fff;box-shadow:0 8px 30px rgba(255,120,0,0.55);margin:6px;transition:transform .1s;}
.btn:active{transform:scale(0.95);}
.bscore{font-size:64px;font-weight:800;color:#ffd54f;text-shadow:0 0 35px rgba(255,200,50,0.9);margin:8px 0;}
.bdetail{font-size:14px;color:rgba(255,255,255,0.68);line-height:2.3;margin-bottom:20px;}
.stars{font-size:40px;margin-bottom:6px;letter-spacing:4px;}

/* FLOATING TEXT */
.floatTxt{position:absolute;z-index:40;font-family:'Kanit',sans-serif;font-weight:800;pointer-events:none;animation:floatUp 1s ease-out forwards;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-60px) scale(1.3);}}

/* SPEED LINES */
#speedLines{position:absolute;inset:0;z-index:5;pointer-events:none;opacity:0;transition:opacity .3s;}

/* LEVEL UP FLASH */
#lvlFlash{position:absolute;inset:0;z-index:45;pointer-events:none;opacity:0;}
#lvlFlash.go{animation:lvlAnim .6s ease-out forwards;}
@keyframes lvlAnim{0%{opacity:0.7;background:rgba(255,200,0,0.3);}100%{opacity:0;}}
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div id="speedLines"></div>
<div id="lvlFlash"></div>

<div id="hud">
  <div class="hb">🏮 <span id="scoreEl">0</span></div>
  <div class="hb">⚡ x<span id="multEl">1.0</span></div>
  <div class="hb">🌟 <span id="bestEl">0</span></div>
</div>
<div id="livesBar">❤️❤️❤️</div>

<img id="lantern" src="images/khomjiw-open-eye.png" alt="โคม" draggable="false"/>
<div id="warn"></div>

<!-- START SCREEN -->
<div class="screen" id="startScreen">
  <div style="font-size:60px;margin-bottom:8px;filter:drop-shadow(0 0 20px rgba(255,180,0,0.9));">🏮</div>
  <div class="stitle">โคมจิ๋วหลบหลุม</div>
  <div class="ssub">
    กดค้างที่โคม แล้ว<strong style="color:#ffd54f;">เลื่อนซ้าย-ขวา</strong>เพื่อหลบ<br>
    สิ่งกีดขวางจะเร็วขึ้นเรื่อยๆ<br>
    🕳️ หลุม &nbsp;|&nbsp; 🪨 หิน &nbsp;|&nbsp; ⚡ ฟ้าผ่า<br>
    ❤️ มีชีวิต 3 ครั้ง — โดน 3 ที = Game Over
  </div>
  <button class="btn" id="startBtn">🏮 เริ่มเลย!</button>
</div>

<!-- GAME OVER SCREEN -->
<div class="screen" id="overScreen" style="display:none;">
  <div style="font-size:54px;margin-bottom:6px;">😢</div>
  <div class="stitle" style="color:#ff6060;">Game Over!</div>
  <div class="stars" id="overStars">⭐⭐⭐</div>
  <div class="bscore" id="overScore">0</div>
  <div class="bdetail" id="overDetail"></div>
  <button class="btn" id="retryBtn">🔄 เล่นอีกครั้ง</button>
</div>

<script>
// ================================================================
// AUDIO ENGINE (Web Audio API — no external files needed)
// ================================================================
let AC = null;
function getAC(){
  if(!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if(AC.state === 'suspended') AC.resume();
  return AC;
}

function playTone(freq, type, dur, vol=0.3, delay=0){
  try{
    const ac=getAC(), o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type=type; o.frequency.setValueAtTime(freq, ac.currentTime+delay);
    g.gain.setValueAtTime(0, ac.currentTime+delay);
    g.gain.linearRampToValueAtTime(vol, ac.currentTime+delay+0.01);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+delay+dur);
    o.start(ac.currentTime+delay); o.stop(ac.currentTime+delay+dur+0.05);
  }catch(e){}
}

function playNoise(dur, vol=0.15){
  try{
    const ac=getAC(), buf=ac.createBuffer(1,ac.sampleRate*dur,ac.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src=ac.createBufferSource(), g=ac.createGain(), f=ac.createBiquadFilter();
    f.type='bandpass'; f.frequency.value=300;
    src.buffer=buf; src.connect(f); f.connect(g); g.connect(ac.destination);
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    src.start(); src.stop(ac.currentTime+dur+0.05);
  }catch(e){}
}

const SFX = {
  hit()   { playTone(120,'sawtooth',0.25,0.4); playNoise(0.2,0.2); },
  dodge() { playTone(880,'sine',0.08,0.15); playTone(1200,'sine',0.08,0.1,0.08); },
  score() { playTone(660,'sine',0.07,0.12); playTone(880,'sine',0.07,0.1,0.07); },
  levelUp(){ [440,550,660,880].forEach((f,i)=>playTone(f,'sine',0.15,0.2,i*0.07)); },
  gameOver(){ [330,280,220,180].forEach((f,i)=>playTone(f,'sawtooth',0.3,0.3,i*0.12)); },
  start()  { [440,550,660].forEach((f,i)=>playTone(f,'sine',0.2,0.2,i*0.08)); },
};

// ================================================================
// BGM — simple ambient loop
// ================================================================
let bgmNode=null, bgmGain=null;
function startBGM(){
  try{
    const ac=getAC();
    if(bgmNode){ bgmNode.stop(); bgmNode=null; }
    bgmGain=ac.createGain(); bgmGain.gain.value=0.07; bgmGain.connect(ac.destination);
    const notes=[220,246,261,293,329,349,392,440];
    let t=ac.currentTime+0.1;
    function schedule(){
      for(let i=0;i<16;i++){
        const f=notes[Math.floor(Math.random()*notes.length)];
        const o=ac.createOscillator(), g=ac.createGain();
        o.type='sine'; o.frequency.value=f*(Math.random()>0.5?2:1);
        o.connect(g); g.connect(bgmGain);
        g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.3,t+0.05);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
        o.start(t); o.stop(t+0.5); t+=0.38+Math.random()*0.3;
      }
      setTimeout(schedule,5000);
    }
    schedule();
  }catch(e){}
}
function stopBGM(){ try{ if(bgmGain) bgmGain.gain.setTargetAtTime(0,AC.currentTime,0.3); }catch(e){} }

// ================================================================
// CANVAS + STATE
// ================================================================
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
let W, H;

// GAME STATE
let playing=false, gameStarted=false;
let score=0, bestScore=0, multiplier=1.0;
let lives=3, invincible=false, invTimer=0;
let speed=4, frameCount=0, level=1;
let lanternX=0, lanternY=0;
let isDragging=false, dragOffX=0;
let obstacles=[], particles=[], floats=[];
let bgLanterns=[], bgStars=[];
let spawnTimer=0, spawnInterval=60;
let scrollOffset=0;
let raf=null;

const LANE_COUNT = 5;
let laneW, lanes=[];

const lanternEl = document.getElementById('lantern');
const warnEl    = document.getElementById('warn');
const hud       = document.getElementById('hud');
const livesBar  = document.getElementById('livesBar');
const scoreEl   = document.getElementById('scoreEl');
const multEl    = document.getElementById('multEl');
const bestEl    = document.getElementById('bestEl');
const startScreen = document.getElementById('startScreen');
const overScreen  = document.getElementById('overScreen');

// ================================================================
// RESIZE
// ================================================================
function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  laneW = W / LANE_COUNT;
  lanes = Array.from({length:LANE_COUNT},(_,i)=> laneW*i + laneW/2);
  if(!playing){ lanternX=W/2; lanternY=H*0.78; }
  setLanternPos(lanternX, lanternY);
  buildBg();
}

// ================================================================
// BACKGROUND
// ================================================================
function buildBg(){
  bgStars = Array.from({length:120},()=>({
    x:Math.random()*W, y:Math.random()*H,
    r:Math.random()*1.6+0.3, a:Math.random()*0.7+0.3,
    tw:Math.random()*3+1, speed:Math.random()*0.3+0.05
  }));
  bgLanterns = Array.from({length:18},()=>({
    x:Math.random()*W, y:Math.random()*H,
    size:Math.random()*18+10,
    col:['#ff9800','#ff5722','#ffd54f','#ff7043'][Math.floor(Math.random()*4)],
    speed:Math.random()*0.6+0.2,
    drift:Math.random()*0.5-0.25,
    alpha:Math.random()*0.25+0.08
  }));
}

// ================================================================
// DRAW BACKGROUND
// ================================================================
function drawBg(){
  // Sky gradient
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#030610');
  bg.addColorStop(0.4,'#0a1628');
  bg.addColorStop(0.75,'#0d1f10');
  bg.addColorStop(1,'#1a2e08');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // Stars
  const t=Date.now()/1000;
  bgStars.forEach(s=>{
    s.y += s.speed*(playing?speed*0.1:0.5);
    if(s.y>H) s.y=-5;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${s.a*(0.6+0.4*Math.sin(t*s.tw))})`;
    ctx.fill();
  });

  // Moon
  ctx.save();
  const mx=W*0.82, my=H*0.12;
  const mg=ctx.createRadialGradient(mx,my,2,mx,my,38);
  mg.addColorStop(0,'rgba(255,250,200,0.95)');
  mg.addColorStop(0.6,'rgba(255,230,120,0.4)');
  mg.addColorStop(1,'rgba(255,200,50,0)');
  ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(mx,my,38,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,248,190,0.92)'; ctx.beginPath(); ctx.arc(mx,my,16,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Floating bg lanterns
  bgLanterns.forEach(l=>{
    l.y -= l.speed*(playing?speed*0.05:0.3);
    l.x += l.drift*0.3;
    if(l.y < -30){ l.y=H+20; l.x=Math.random()*W; }
    ctx.save();
    ctx.globalAlpha=l.alpha;
    ctx.font=`${l.size}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🏮',l.x,l.y);
    ctx.restore();
  });

  // Road / path — center vertical strip
  const roadW = W*0.88;
  const roadX = (W-roadW)/2;

  // Road glow
  const rg=ctx.createLinearGradient(roadX,0,roadX+roadW,0);
  rg.addColorStop(0,'rgba(0,0,0,0)');
  rg.addColorStop(0.15,'rgba(20,30,15,0.85)');
  rg.addColorStop(0.85,'rgba(20,30,15,0.85)');
  rg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=rg; ctx.fillRect(roadX,0,roadW,H);

  // Lane lines
  scrollOffset = (scrollOffset + speed*0.8) % 80;
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=2; ctx.setLineDash([30,50]);
  for(let i=1;i<LANE_COUNT;i++){
    const lx = laneW*i;
    ctx.lineDashOffset = -scrollOffset;
    ctx.beginPath(); ctx.moveTo(lx,0); ctx.lineTo(lx,H); ctx.stroke();
  }
  ctx.setLineDash([]); ctx.restore();

  // Road edge glow
  const eg1=ctx.createLinearGradient(roadX,0,roadX+40,0);
  eg1.addColorStop(0,'rgba(255,180,0,0)'); eg1.addColorStop(1,'rgba(255,180,0,0.08)');
  ctx.fillStyle=eg1; ctx.fillRect(roadX,0,40,H);
  const eg2=ctx.createLinearGradient(roadX+roadW-40,0,roadX+roadW,0);
  eg2.addColorStop(0,'rgba(255,180,0,0.08)'); eg2.addColorStop(1,'rgba(255,180,0,0)');
  ctx.fillStyle=eg2; ctx.fillRect(roadX+roadW-40,0,40,H);

  // Ground strip at bottom
  const gg=ctx.createLinearGradient(0,H*0.88,0,H);
  gg.addColorStop(0,'rgba(20,50,10,0)')
  gg.addColorStop(1,'rgba(10,30,5,0.95)');
  ctx.fillStyle=gg; ctx.fillRect(0,H*0.88,W,H*0.12);
}

// ================================================================
// OBSTACLES
// ================================================================
const OBS_TYPES=[
  {emoji:'🕳️', w:55, h:30, score:10, col:'rgba(100,50,0,0.6)',  label:'-10 HP!'},
  {emoji:'🪨',  w:50, h:50, score:10, col:'rgba(80,80,80,0.5)',   label:'หิน!'},
  {emoji:'⚡',  w:40, h:60, score:15, col:'rgba(255,220,0,0.3)',  label:'ฟ้าผ่า!'},
  {emoji:'🌊',  w:65, h:40, score:10, col:'rgba(0,100,200,0.4)', label:'คลื่น!'},
];

function spawnObstacle(){
  const type = OBS_TYPES[Math.floor(Math.random()*OBS_TYPES.length)];
  // pick random lane, avoid current lantern lane sometimes
  const laneIdx = Math.floor(Math.random()*LANE_COUNT);
  const x = lanes[laneIdx];
  obstacles.push({
    x, y:-60, laneIdx,
    w:type.w*(0.9+Math.random()*0.3),
    h:type.h*(0.9+Math.random()*0.3),
    emoji:type.emoji, label:type.label,
    speed: speed*(0.9+Math.random()*0.3),
    col:type.col,
    wobble: Math.random()*Math.PI*2,
    wobbleSpeed: Math.random()*0.05+0.02,
  });
}

function drawObstacles(){
  const t=Date.now()/1000;
  obstacles.forEach(ob=>{
    ob.y += ob.speed;
    ob.wobble += ob.wobbleSpeed;
    const wx = Math.sin(ob.wobble)*6;
    ctx.save();
    // Glow
    const og=ctx.createRadialGradient(ob.x+wx,ob.y,5,ob.x+wx,ob.y,ob.w);
    og.addColorStop(0,ob.col); og.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=og; ctx.beginPath(); ctx.arc(ob.x+wx,ob.y,ob.w,0,Math.PI*2); ctx.fill();
    // Emoji
    ctx.font=`${ob.w*0.9}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(ob.emoji, ob.x+wx, ob.y);
    ctx.restore();
  });
  obstacles = obstacles.filter(ob=>ob.y<H+80);
}

// ================================================================
// PARTICLES
// ================================================================
function spawnParticles(x,y,col,count=12){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2, spd=Math.random()*5+2;
    particles.push({x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd-3,
      r:Math.random()*4+2,col,life:1});
  }
}

function drawParticles(){
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=0.03;
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    ctx.fillStyle=p.col; ctx.fill(); ctx.restore();
  });
  particles=particles.filter(p=>p.life>0);
}

// ================================================================
// FLOATING TEXT
// ================================================================
function addFloat(x,y,text,col='#ffd54f'){
  floats.push({x,y,text,col,life:1,vy:-2});
}

function drawFloats(){
  floats.forEach(f=>{
    f.y+=f.vy; f.life-=0.025;
    ctx.save(); ctx.globalAlpha=f.life;
    ctx.font=`bold ${Math.round(18+f.life*4)}px Kanit`;
    ctx.fillStyle=f.col; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(f.text,f.x,f.y); ctx.restore();
  });
  floats=floats.filter(f=>f.life>0);
}

// ================================================================
// LANTERN POSITION
// ================================================================
function setLanternPos(x,y){
  lanternX=x; lanternY=y;
  lanternEl.style.left=x+'px';
  lanternEl.style.top=y+'px';
}

// Lantern glow on canvas
function drawLanternGlow(){
  if(!playing) return;
  const x=lanternX, y=lanternY;
  ctx.save();
  const g1=ctx.createRadialGradient(x,y,8,x,y,70);
  g1.addColorStop(0,'rgba(255,200,60,0.45)');
  g1.addColorStop(1,'rgba(255,100,0,0)');
  ctx.fillStyle=g1; ctx.beginPath(); ctx.arc(x,y,70,0,Math.PI*2); ctx.fill();
  // Light beam downward
  const g2=ctx.createLinearGradient(x,y,x,y+120);
  g2.addColorStop(0,'rgba(255,200,60,0.2)');
  g2.addColorStop(1,'rgba(255,180,0,0)');
  ctx.fillStyle=g2;
  ctx.beginPath(); ctx.moveTo(x-12,y); ctx.lineTo(x+12,y); ctx.lineTo(x+30,y+120); ctx.lineTo(x-30,y+120); ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// ================================================================
// COLLISION
// ================================================================
function checkCollisions(){
  if(invincible) return;
  obstacles.forEach((ob,i)=>{
    const dx=Math.abs(lanternX-ob.x), dy=Math.abs(lanternY-ob.y);
    if(dx<ob.w*0.48 && dy<ob.h*0.55){
      obstacles.splice(i,1);
      onHit(ob);
    }
  });
}

function onHit(ob){
  lives--;
  SFX.hit();
  spawnParticles(lanternX,lanternY,'#ff4444',16);
  addFloat(lanternX,lanternY-40,ob.label,'#ff5555');
  warnEl.classList.remove('flash'); void warnEl.offsetWidth; warnEl.classList.add('flash');
  lanternEl.classList.remove('hit'); void lanternEl.offsetWidth; lanternEl.classList.add('hit');
  updateLives();
  multiplier=1.0; multEl.innerText=multiplier.toFixed(1);
  // Invincibility frames
  invincible=true;
  setTimeout(()=>{ invincible=false; lanternEl.classList.remove('inv'); },1800);
  lanternEl.classList.add('inv');
  if(lives<=0) setTimeout(endGame,400);
}

function updateLives(){
  livesBar.innerText = '❤️'.repeat(Math.max(0,lives)) + '🖤'.repeat(Math.max(0,3-lives));
}

// ================================================================
// SCORE
// ================================================================
function addScore(pts){
  score += Math.round(pts*multiplier);
  scoreEl.innerText=score;
  if(score>bestScore){ bestScore=score; bestEl.innerText=bestScore; }
}

// ================================================================
// SPEED / LEVEL
// ================================================================
function updateSpeed(){
  // Every 300 frames increase speed and spawn rate
  if(frameCount % 300 === 0 && frameCount>0){
    speed = Math.min(14, speed+0.6);
    spawnInterval = Math.max(28, spawnInterval-4);
    level++;
    SFX.levelUp();
    addFloat(W/2,H/2,'LEVEL '+level+'!','#ffd54f');
    const lf=document.getElementById('lvlFlash');
    if(lf){ lf.classList.remove('go'); void lf.offsetWidth; lf.classList.add('go'); }
    // Increase multiplier
    multiplier = Math.min(5, multiplier+0.2);
    multEl.innerText=multiplier.toFixed(1);
  }
}

// ================================================================
// MAIN LOOP
// ================================================================
function loop(){
  if(!playing){ raf=requestAnimationFrame(loop); return; }
  frameCount++;

  drawBg();
  drawObstacles();
  drawParticles();
  drawLanternGlow();
  drawFloats();

  // Spawn
  spawnTimer++;
  if(spawnTimer>=spawnInterval){
    spawnTimer=0;
    spawnObstacle();
    // Double spawn at high speed
    if(speed>8 && Math.random()>0.5) spawnObstacle();
    // Score for surviving
    addScore(5);
    SFX.score();
  }

  updateSpeed();
  checkCollisions();

  raf=requestAnimationFrame(loop);
}

// ================================================================
// GAME FLOW
// ================================================================
function startGame(){
  getAC(); // unlock audio
  startScreen.style.display='none';
  overScreen.style.display='none';
  score=0; multiplier=1.0; lives=3; speed=4;
  frameCount=0; level=1; spawnTimer=0; spawnInterval=60;
  obstacles=[]; particles=[]; floats=[];
  invincible=false;
  scrollOffset=0;
  lanternX=W/2; lanternY=H*0.78;
  setLanternPos(lanternX,lanternY);
  scoreEl.innerText='0'; multEl.innerText='1.0'; bestEl.innerText=bestScore;
  updateLives();
  hud.style.display='flex';
  livesBar.style.display='block';
  lanternEl.style.display='block';
  playing=true;
  SFX.start();
  startBGM();
}

function endGame(){
  playing=false;
  stopBGM();
  SFX.gameOver();
  hud.style.display='none';
  livesBar.style.display='none';
  lanternEl.style.display='none';
  document.getElementById('overScore').innerText=score;
  const stars = score>=500?'⭐⭐⭐':score>=200?'⭐⭐':score>0?'⭐':'💀';
  document.getElementById('overStars').innerText=stars;
  document.getElementById('overDetail').innerHTML=
    `ด่านที่ถึง: ${level} &nbsp;|&nbsp; multiplier สูงสุด: x${multiplier.toFixed(1)}<br>เบสสกอร์: ${bestScore}`;
  overScreen.style.display='flex';
}

// ================================================================
// TOUCH / MOUSE DRAG
// ================================================================
function getTouchPos(e){ const t=e.touches?e.touches[0]:e; return{x:t.clientX,y:t.clientY}; }

function onDown(e){
  if(!playing) return;
  const p=getTouchPos(e);
  const dx=p.x-lanternX, dy=p.y-lanternY;
  if(Math.sqrt(dx*dx+dy*dy)<55){
    isDragging=true;
    dragOffX=dx;
    e.preventDefault();
  }
}

function onMove(e){
  if(!playing||!isDragging) return;
  e.preventDefault();
  const p=getTouchPos(e);
  let nx=p.x-dragOffX;
  // Clamp within road
  nx=Math.max(laneW*0.3, Math.min(W-laneW*0.3, nx));
  setLanternPos(nx, lanternY);
}

function onUp(){ isDragging=false; }

canvas.addEventListener('touchstart', onDown, {passive:false});
canvas.addEventListener('touchmove',  onMove, {passive:false});
canvas.addEventListener('touchend',   onUp,   {passive:true});
canvas.addEventListener('mousedown',  onDown);
canvas.addEventListener('mousemove',  e=>{ if(isDragging) onMove(e); });
canvas.addEventListener('mouseup',    onUp);

// ================================================================
// BUTTONS
// ================================================================
document.getElementById('startBtn').onclick=startGame;
document.getElementById('retryBtn').onclick=startGame;

// Fallback for missing image
document.getElementById('lantern').onerror=function(){
  this.style.cssText='position:absolute;z-index:30;pointer-events:none;display:none;width:60px;height:60px;transform:translate(-50%,-50%);font-size:50px;line-height:60px;text-align:center;';
  this.outerHTML=this.outerHTML.replace(/src="[^"]*"/,'').replace('<img','<div').replace('/>','>🏮</div>');
  document.getElementById('lantern').innerText='🏮';
};

// level flash div
const lf=document.createElement('div');
lf.id='lvlFlash'; lf.style.cssText='position:absolute;inset:0;z-index:45;pointer-events:none;opacity:0;';
document.body.appendChild(lf);
lf.addEventListener('animationend',()=>lf.classList.remove('go'));
const style=document.createElement('style');
style.textContent='.go{animation:lvl .6s ease-out forwards;}@keyframes lvl{0%{opacity:0.6;background:rgba(255,200,0,0.25);}100%{opacity:0;}}';
document.head.appendChild(style);

// ================================================================
// INIT
// ================================================================
window.addEventListener('resize',resize);
resize();
loop();
</script>
</body>
</html>
