<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>โคมจิ๋วหลบหลุม</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{overflow:hidden;font-family:'Kanit',sans-serif;background:#030610;
  width:100vw;height:100vh;touch-action:none;user-select:none;}
#C{position:absolute;inset:0;width:100%;height:100%;}

#hud{position:absolute;top:0;left:0;width:100%;z-index:20;padding:11px 13px;
  display:none;flex-direction:row;justify-content:space-between;align-items:center;pointer-events:none;}
.hb{background:rgba(0,0,0,0.6);color:#fff;padding:8px 13px;border-radius:13px;
  backdrop-filter:blur(10px);font-size:13px;font-weight:700;
  border:1px solid rgba(255,200,80,0.18);}
.hb span{color:#ffd54f;}

#KOM{position:absolute;z-index:30;pointer-events:none;display:none;
  width:58px;height:58px;transform:translate(-50%,-50%);
  filter:drop-shadow(0 0 16px rgba(255,180,0,1)) drop-shadow(0 0 30px rgba(255,100,0,0.55));
  object-fit:contain;}

#warn{position:absolute;inset:0;pointer-events:none;z-index:100;border:14px solid transparent;}
#warn.flash{animation:wf .38s ease-out forwards;}
@keyframes wf{0%{border-color:rgba(255,30,30,0.95);}100%{border-color:transparent;}}

.sc{position:absolute;inset:0;z-index:50;background:rgba(3,6,16,0.94);
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  color:#fff;text-align:center;padding:26px;backdrop-filter:blur(8px);}
.tt{font-size:33px;font-weight:800;color:#ffd54f;
  text-shadow:0 0 26px rgba(255,200,50,0.8);margin-bottom:9px;}
.sb{color:rgba(255,255,255,0.8);font-size:14px;line-height:2.1;margin-bottom:22px;}
.btn{border:none;border-radius:20px;padding:15px 36px;font-size:17px;
  font-family:'Kanit',sans-serif;font-weight:700;cursor:pointer;
  background:linear-gradient(135deg,#ffb300,#ff5f00);color:#fff;
  box-shadow:0 8px 26px rgba(255,110,0,0.5);margin:6px;display:block;width:220px;}
.btn:active{transform:scale(0.96);}
.btn2{background:linear-gradient(135deg,#37474f,#1c2a32);
  box-shadow:0 4px 14px rgba(0,0,0,0.5);}
.big{font-size:60px;font-weight:800;color:#ffd54f;
  text-shadow:0 0 30px rgba(255,200,50,0.85);margin:7px 0;}
.det{font-size:14px;color:rgba(255,255,255,0.65);line-height:2.3;margin-bottom:20px;}
.str{font-size:38px;margin-bottom:5px;letter-spacing:4px;}

#lvlFlash{position:absolute;inset:0;z-index:44;pointer-events:none;
  display:flex;justify-content:center;align-items:center;opacity:0;}
#lvlFlash.go{animation:lv 1.1s ease-out forwards;}
@keyframes lv{
  0%{opacity:0;transform:scale(0.4);}18%{opacity:1;transform:scale(1.05);}
  65%{opacity:1;transform:scale(1);}100%{opacity:0;}}
#lvlTxt{font-size:46px;font-weight:800;color:#ffd54f;font-family:'Kanit',sans-serif;
  text-shadow:0 0 38px rgba(255,200,0,1);}
</style>
</head>
<body>
<canvas id="C"></canvas>

<div id="hud">
  <div class="hb">🏮 <span id="SC">0</span></div>
  <div class="hb">⚡ x<span id="MU">1.0</span></div>
  <div class="hb">🏆 <span id="BS">0</span></div>
</div>

<img id="KOM" src="images/khomjiw-open-eye.png" alt="โคม" draggable="false"/>
<div id="warn"></div>
<div id="lvlFlash"><div id="lvlTxt"></div></div>

<!-- START -->
<div class="sc" id="ss">
  <div style="font-size:56px;margin-bottom:8px;">🏮</div>
  <div class="tt">โคมจิ๋วหลบหลุม</div>
  <div class="sb">
    กดค้างที่โคม แล้ว<strong style="color:#ffd54f;">เลื่อนซ้าย-ขวา</strong>เพื่อหลบ<br>
    สิ่งกีดขวางเร็วขึ้นเรื่อยๆ ทุก Level<br>
    🕳️ หลุม &nbsp;|&nbsp; 🪨 หิน &nbsp;|&nbsp; ⚡ ฟ้าผ่า &nbsp;|&nbsp; 🌊 คลื่น<br>
    <strong style="color:#ff7070;">โดนครั้งเดียว = Game Over!</strong>
  </div>
  <button class="btn" id="btnStart">🏮 เริ่มเลย!</button>
</div>

<!-- GAME OVER -->
<div class="sc" id="os" style="display:none;">
  <div style="font-size:52px;margin-bottom:6px;">💀</div>
  <div class="tt" style="color:#ff6060;">Game Over!</div>
  <div class="str" id="oStr">⭐</div>
  <div class="big" id="oSc">0</div>
  <div class="det" id="oDet"></div>
  
  <button class="btn btn2" id="btnQuit">🚪 ออกจากเกม</button>
</div>

<script>
// ============================================================
// AUDIO
// BGM ใช้ AudioContext แยก (bgmAC) — ปิดด้วย .close() เงียบทันที
// SFX ใช้ AudioContext อีกตัว (sfxAC)
// ============================================================
let sfxCtx = null;
function getSFX(){
  if(!sfxCtx) sfxCtx = new(window.AudioContext||window.webkitAudioContext)();
  if(sfxCtx.state==='suspended') sfxCtx.resume();
  return sfxCtx;
}
function tone(f,tp,dur,vol=0.22,d=0){
  try{
    const ac=getSFX(),o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type=tp;o.frequency.value=f;
    const t=ac.currentTime+d;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t);o.stop(t+dur+0.05);
  }catch(e){}
}
function nz(dur,vol=0.18){
  try{
    const ac=getSFX(),sr=ac.sampleRate,buf=ac.createBuffer(1,sr*dur,sr);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    const src=ac.createBufferSource(),g=ac.createGain(),flt=ac.createBiquadFilter();
    flt.type='bandpass';flt.frequency.value=220;
    src.buffer=buf;src.connect(flt);flt.connect(g);g.connect(ac.destination);
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+dur);
    src.start();src.stop(ac.currentTime+dur+0.05);
  }catch(e){}
}
const SFX={
  hit()  { nz(0.18,0.22); tone(110,'sawtooth',0.18,0.28); },
  lvl()  { [440,554,659,880].forEach((f,i)=>tone(f,'sine',0.16,0.2,i*0.09)); },
  over() { [330,277,220,165].forEach((f,i)=>tone(f,'sawtooth',0.3,0.28,i*0.13)); },
  start(){ [523,659,784].forEach((f,i)=>tone(f,'sine',0.18,0.2,i*0.1)); },
};

// BGM — ใช้ flag bgmAlive กัน setTimeout วนซ้ำ
let bgmAC=null, bgmAlive=false;

function startBGM(){
  stopBGM();
  bgmAlive=true;
  try{
    bgmAC=new(window.AudioContext||window.webkitAudioContext)();
    loopBGM(bgmAC);
  }catch(e){}
}

function loopBGM(ac){
  // เช็ค flag ก่อนทุกครั้ง — ถ้า stopBGM ถูกเรียกแล้วหยุดทันที
  if(!bgmAlive || ac!==bgmAC) return;
  try{
    const mg=ac.createGain(); mg.gain.value=0.055; mg.connect(ac.destination);
    const sc=[220,247,262,294,330,349,392,440,494,523];
    let t=ac.currentTime+0.05;
    for(let i=0;i<10;i++){
      const f=sc[Math.floor(Math.random()*sc.length)]*(Math.random()>0.45?2:1);
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='sine';o.frequency.value=f;
      o.connect(g);g.connect(mg);
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.28,t+0.04);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.36);
      o.start(t);o.stop(t+0.42);
      t+=0.36+Math.random()*0.24;
    }
    // ส่ง reference ac เข้าไปเพื่อเช็คว่าเป็น instance เดิม
    setTimeout(()=>loopBGM(ac), 4200);
  }catch(e){}
}

function stopBGM(){
  bgmAlive=false;   // ← flag นี้หยุด loopBGM ทุก setTimeout ที่ค้างอยู่
  const old=bgmAC;
  bgmAC=null;
  try{ if(old) old.close(); }catch(e){}
}

// ============================================================
// CANVAS & STATE
// ============================================================
const CV=document.getElementById('C');
const cx=CV.getContext('2d');
let W=0,H=0,LW=0;
const NL=5;

let playing=false;
let dead=false;        // ← flag กันชนซ้ำหลังตาย
let score=0,best=0,mult=1.0;
let spd=3.5,sFrm=0,sEvery=65,frm=0,lv=1,scOff=0;
let kx=0,ky=0,drag=false,dDX=0;
let obs=[],parts=[],floats=[],bgS=[],bgL=[];

const KOM=document.getElementById('KOM');
const warnEl=document.getElementById('warn');
const hudEl=document.getElementById('hud');
const scEl=document.getElementById('SC');
const muEl=document.getElementById('MU');
const bsEl=document.getElementById('BS');
const startSc=document.getElementById('ss');
const overSc=document.getElementById('os');
const lvFlash=document.getElementById('lvlFlash');
const lvTxt=document.getElementById('lvlTxt');

// ============================================================
// RESIZE
// ============================================================
function resize(){
  W=CV.width=window.innerWidth;
  H=CV.height=window.innerHeight;
  LW=W/NL;
  makeBG();
  if(!playing){kx=W/2;ky=H*0.78;}
  moveKom(kx,ky);
}

// ============================================================
// BG
// ============================================================
function makeBG(){
  bgS=Array.from({length:130},()=>({
    x:Math.random()*W,y:Math.random()*H,
    r:Math.random()*1.5+0.3,a:Math.random()*0.6+0.3,
    tw:Math.random()*3+1,vy:Math.random()*0.12+0.03
  }));
  bgL=Array.from({length:14},()=>({
    x:Math.random()*W,y:Math.random()*H,
    sz:Math.random()*15+9,al:Math.random()*0.16+0.05,
    vy:Math.random()*0.45+0.12,vx:Math.random()*0.25-0.12
  }));
}

function drawBG(){
  const g=cx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#020510');g.addColorStop(0.45,'#091422');
  g.addColorStop(0.8,'#0c1b09');g.addColorStop(1,'#101d05');
  cx.fillStyle=g;cx.fillRect(0,0,W,H);

  const t=Date.now()/1000;
  bgS.forEach(s=>{
    s.y+=s.vy*(playing?spd*0.12:0.4);
    if(s.y>H){s.y=0;s.x=Math.random()*W;}
    cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);
    cx.fillStyle=`rgba(255,255,255,${s.a*(0.55+0.45*Math.sin(t*s.tw))})`;cx.fill();
  });

  const mx=W*0.83,my=H*0.11;
  cx.save();
  const mg=cx.createRadialGradient(mx,my,1,mx,my,40);
  mg.addColorStop(0,'rgba(255,252,200,0.94)');mg.addColorStop(0.55,'rgba(255,230,100,0.3)');mg.addColorStop(1,'rgba(255,200,50,0)');
  cx.fillStyle=mg;cx.beginPath();cx.arc(mx,my,40,0,Math.PI*2);cx.fill();
  cx.fillStyle='rgba(255,250,190,0.9)';cx.beginPath();cx.arc(mx,my,14,0,Math.PI*2);cx.fill();
  cx.restore();

  bgL.forEach(l=>{
    l.y-=l.vy*(playing?spd*0.04:0.28);l.x+=l.vx;
    if(l.y<-30){l.y=H+20;l.x=Math.random()*W;}
    cx.save();cx.globalAlpha=l.al;
    cx.font=`${l.sz}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText('🏮',l.x,l.y);cx.restore();
  });

  const rw=W*0.88,rx=(W-rw)/2;
  const rg=cx.createLinearGradient(rx,0,rx+rw,0);
  rg.addColorStop(0,'rgba(0,0,0,0)');rg.addColorStop(0.1,'rgba(14,24,11,0.88)');
  rg.addColorStop(0.9,'rgba(14,24,11,0.88)');rg.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=rg;cx.fillRect(rx,0,rw,H);

  scOff=(scOff+spd*0.85)%80;
  cx.save();cx.strokeStyle='rgba(255,255,255,0.1)';cx.lineWidth=2;cx.setLineDash([28,52]);cx.lineDashOffset=-scOff;
  for(let i=1;i<NL;i++){cx.beginPath();cx.moveTo(LW*i,0);cx.lineTo(LW*i,H);cx.stroke();}
  cx.setLineDash([]);cx.restore();

  const gg=cx.createLinearGradient(0,H*0.86,0,H);
  gg.addColorStop(0,'rgba(12,35,6,0)');gg.addColorStop(1,'rgba(5,18,3,0.97)');
  cx.fillStyle=gg;cx.fillRect(0,H*0.86,W,H*0.14);
}

// ============================================================
// OBSTACLES
// ============================================================
const OT=[
  {e:'🕳️',w:55,h:32,lb:'หลุม!',cl:'rgba(70,35,0,0.5)'},
  {e:'🪨', w:52,h:52,lb:'หิน!', cl:'rgba(55,55,55,0.5)'},
  {e:'⚡', w:40,h:62,lb:'ฟ้าผ่า!',cl:'rgba(255,215,0,0.28)'},
  {e:'🌊', w:64,h:40,lb:'คลื่น!',cl:'rgba(0,70,170,0.38)'},
];
function spawn(){
  const ln=Math.floor(Math.random()*NL);
  const tp=OT[Math.floor(Math.random()*OT.length)];
  obs.push({x:LW*ln+LW/2,y:-70,
    w:tp.w*(0.85+Math.random()*0.3),h:tp.h*(0.85+Math.random()*0.28),
    e:tp.e,lb:tp.lb,cl:tp.cl,
    spd:spd*(0.88+Math.random()*0.3),ph:Math.random()*Math.PI*2});
}
function drawObs(){
  const t=Date.now()/1000;
  obs.forEach(o=>{
    o.y+=o.spd;
    const wx=Math.sin(t*2.5+o.ph)*5;
    cx.save();
    const og=cx.createRadialGradient(o.x+wx,o.y,3,o.x+wx,o.y,o.w*0.95);
    og.addColorStop(0,o.cl);og.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=og;cx.beginPath();cx.arc(o.x+wx,o.y,o.w*0.95,0,Math.PI*2);cx.fill();
    cx.font=`${o.w*0.88}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(o.e,o.x+wx,o.y);cx.restore();
  });
  obs=obs.filter(o=>o.y<H+90);
}

// ============================================================
// PARTICLES & FLOATS
// ============================================================
function burst(x,y,col,n=16){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*6+2;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,r:Math.random()*4+1.5,col,life:1});
  }
}
function drawParts(){
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life-=0.03;
    cx.save();cx.globalAlpha=Math.max(0,p.life);
    cx.beginPath();cx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);cx.fillStyle=p.col;cx.fill();cx.restore();});
  parts=parts.filter(p=>p.life>0);
}
function addFlt(x,y,txt,col='#ffd54f'){
  floats.push({x,y,txt,col,life:1,vy:-1.8});
}
function drawFlt(){
  floats.forEach(f=>{f.y+=f.vy;f.life-=0.022;
    cx.save();cx.globalAlpha=Math.max(0,f.life);
    cx.font=`bold ${18+Math.round(f.life*3)}px Kanit`;
    cx.fillStyle=f.col;cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(f.txt,f.x,f.y);cx.restore();});
  floats=floats.filter(f=>f.life>0);
}

// ============================================================
// LANTERN
// ============================================================
function moveKom(x,y){kx=x;ky=y;KOM.style.left=x+'px';KOM.style.top=y+'px';}
function drawGlow(){
  cx.save();
  const ga=cx.createRadialGradient(kx,ky,5,kx,ky,70);
  ga.addColorStop(0,'rgba(255,200,55,0.4)');ga.addColorStop(1,'rgba(255,80,0,0)');
  cx.fillStyle=ga;cx.beginPath();cx.arc(kx,ky,70,0,Math.PI*2);cx.fill();
  const gb=cx.createLinearGradient(kx,ky,kx,ky+105);
  gb.addColorStop(0,'rgba(255,200,50,0.16)');gb.addColorStop(1,'rgba(255,160,0,0)');
  cx.fillStyle=gb;cx.beginPath();
  cx.moveTo(kx-10,ky);cx.lineTo(kx+10,ky);cx.lineTo(kx+28,ky+105);cx.lineTo(kx-28,ky+105);
  cx.closePath();cx.fill();cx.restore();
}

// ============================================================
// COLLISION — ชีวิตเดียว โดนปุ๊บจบเลย
// ============================================================
function checkHit(){
  if(dead||!playing) return;
  for(let i=0;i<obs.length;i++){
    const o=obs[i];
    if(Math.abs(kx-o.x)<o.w*0.44 && Math.abs(ky-o.y)<o.h*0.5){
      dead=true;
      playing=false;
      stopBGM();        // หยุดเสียงทันที — bgmAlive=false ทำให้ทุก loop หยุด
      obs=[];           // ล้าง obstacle กันวาดต่อ
      SFX.hit();
      burst(kx,ky,'#ff4444',22);
      addFlt(kx,ky-50,o.lb+' 💀','#ff5555');
      warnEl.classList.remove('flash');void warnEl.offsetWidth;warnEl.classList.add('flash');
      KOM.style.display='none';
      hudEl.style.display='none';
      _overTmr=setTimeout(showOver,800);
      return;
    }
  }
}

// ============================================================
// LEVEL UP
// ============================================================
function checkLvl(){
  if(frm>0&&frm%200===0){
    spd=Math.min(13,spd+0.65);
    sEvery=Math.max(24,sEvery-5);
    lv++;mult=Math.min(5,mult+0.3);
    muEl.innerText=mult.toFixed(1);
    SFX.lvl();
    lvTxt.innerText='LEVEL '+lv+' ⚡';
    lvFlash.classList.remove('go');void lvFlash.offsetWidth;lvFlash.classList.add('go');
  }
}

// ============================================================
// MAIN LOOP
// ============================================================
function loop(){
  requestAnimationFrame(loop);
  drawBG();
  if(!playing){
    // วาด particles/floats ต่อแม้เกมหยุด (เห็น effect ตอนตาย)
    drawParts();drawFlt();
    return;
  }
  frm++;
  drawObs();drawParts();drawGlow();drawFlt();
  sFrm++;
  if(sFrm>=sEvery){
    sFrm=0;spawn();
    if(spd>7&&Math.random()>0.55)spawn();
    score+=Math.round(5*mult);
    scEl.innerText=score;
    if(score>best){best=score;bsEl.innerText=best;}
  }
  checkLvl();
  checkHit();
}

// ============================================================
// START / GAME OVER / QUIT
// ============================================================
let _overTmr=null;

function startGame(){
  getSFX();
  // ยกเลิก showOver ที่อาจค้างอยู่
  if(_overTmr){ clearTimeout(_overTmr); _overTmr=null; }
  stopBGM();
  // reset ทุกอย่าง
  dead=false; playing=false;
  score=0; mult=1.0;
  spd=3.5; sFrm=0; sEvery=65; frm=0; lv=1; scOff=0;
  obs=[]; parts=[]; floats=[];
  kx=W/2; ky=H*0.78; moveKom(kx,ky);
  scEl.innerText='0'; muEl.innerText='1.0'; bsEl.innerText=best;
  hudEl.style.display='flex';
  KOM.style.display='block';
  startSc.style.display='none';
  overSc.style.display='none';
  playing=true;
  SFX.start();
  startBGM();
}

function showOver(){
  _overTmr=null;
  if(!dead) return;  // ถูก cancel แล้ว (กด retry ก่อน 800ms)
  KOM.style.display='none';
  hudEl.style.display='none';
  SFX.over();
  document.getElementById('oSc').innerText=score;
  document.getElementById('oStr').innerText=score>=500?'⭐⭐⭐':score>=200?'⭐⭐':score>0?'⭐':'💀';
  document.getElementById('oDet').innerHTML=
    `ด่านสูงสุด: ${lv} &nbsp;|&nbsp; เบสสกอร์: ${best}`;
  overSc.style.display='flex';
}

function quitGame(){
  stopBGM();
  overSc.style.display='none';
  startSc.style.display='flex';
}

// ============================================================
// INPUT
// ============================================================
function ptOf(e){const t=e.touches?e.touches[0]:e;return{x:t.clientX,y:t.clientY};}

CV.addEventListener('touchstart',e=>{
  if(!playing)return;
  const p=ptOf(e);
  if(Math.hypot(p.x-kx,p.y-ky)<62){drag=true;dDX=p.x-kx;e.preventDefault();}
},{passive:false});
CV.addEventListener('touchmove',e=>{
  if(!drag||!playing)return;e.preventDefault();
  const p=ptOf(e);
  moveKom(Math.max(LW*0.3,Math.min(W-LW*0.3,p.x-dDX)),ky);
},{passive:false});
CV.addEventListener('touchend',()=>{drag=false;},{passive:true});
CV.addEventListener('mousedown',e=>{
  if(!playing)return;
  if(Math.hypot(e.clientX-kx,e.clientY-ky)<62){drag=true;dDX=e.clientX-kx;}
});
CV.addEventListener('mousemove',e=>{
  if(!drag||!playing)return;
  moveKom(Math.max(LW*0.3,Math.min(W-LW*0.3,e.clientX-dDX)),ky);
});
CV.addEventListener('mouseup',()=>{drag=false;});

// ============================================================
// BUTTONS
// ============================================================
document.getElementById('btnStart').onclick=startGame;
document.getElementById('btnRetry').onclick=startGame;
document.getElementById('btnQuit').onclick=quitGame;

// emoji fallback
document.getElementById('KOM').onerror=function(){
  const d=document.createElement('div');
  d.id='KOM';
  d.style.cssText='position:absolute;z-index:30;pointer-events:none;display:none;'
    +'width:58px;height:58px;transform:translate(-50%,-50%);font-size:46px;'
    +'line-height:58px;text-align:center;filter:drop-shadow(0 0 16px rgba(255,180,0,1));';
  d.innerText='🏮';
  this.replaceWith(d);
};

// ============================================================
// INIT
// ============================================================
window.addEventListener('resize',resize);

// หยุดเสียงทันทีเมื่อออกจากหน้าจอ / เปลี่ยน tab / ล็อคหน้าจอ
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){
    stopBGM();
  }
});
window.addEventListener('pagehide', stopBGM);
// blur/focus ไม่ resume เพราะ user อาจแค่สลับ app

resize();
loop();
</script>
