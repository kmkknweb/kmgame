<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>วิ่งโคมรอบบึง</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{overflow:hidden;font-family:'Kanit',sans-serif;background:#060b18;width:100vw;height:100vh;touch-action:none;}
#gameCanvas{display:block;width:100vw;height:100vh;touch-action:none;}
.top-ui{position:absolute;top:0;left:0;width:100%;z-index:20;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;pointer-events:none;}
.ui-box{background:rgba(0,0,0,0.6);color:#fff;padding:8px 13px;border-radius:13px;backdrop-filter:blur(8px);font-size:13px;font-weight:600;border:1px solid rgba(255,200,80,0.2);}
.ui-box span{color:#ffd54f;font-weight:800;}
.ui-level{background:linear-gradient(135deg,rgba(255,140,0,0.25),rgba(255,60,0,0.25));border-color:rgba(255,140,0,0.45);}
#timerBar{position:absolute;top:54px;left:12px;right:12px;height:8px;background:rgba(255,255,255,0.1);border-radius:5px;z-index:20;overflow:hidden;}
#timerFill{height:100%;width:100%;border-radius:5px;background:linear-gradient(90deg,#4caf50,#ffeb3b 60%,#f44336);transition:width 0.08s linear;}
#lantern{position:absolute;width:48px;height:48px;transform:translate(-50%,-50%);pointer-events:none;z-index:30;filter:drop-shadow(0 0 14px rgba(255,180,0,1));display:none;object-fit:contain;border-radius:6px;}
#warning{position:absolute;inset:0;pointer-events:none;z-index:100;border:12px solid transparent;}
#warning.flash{animation:wf 0.4s ease-out forwards;}
@keyframes wf{0%{border-color:rgba(255,40,40,0.9);}100%{border-color:transparent;}}
.screen{position:absolute;inset:0;z-index:50;background:rgba(4,8,20,0.92);display:flex;flex-direction:column;justify-content:center;align-items:center;color:#fff;text-align:center;padding:24px;backdrop-filter:blur(6px);}
.s-title{font-size:32px;font-weight:800;color:#ffd54f;text-shadow:0 0 28px rgba(255,200,50,0.75);margin-bottom:8px;}
.s-sub{color:rgba(255,255,255,0.78);font-size:14px;line-height:2;margin-bottom:22px;}
.btn{border:none;border-radius:18px;padding:14px 34px;font-size:17px;font-family:'Kanit',sans-serif;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#ffb300,#ff6f00);color:#fff;box-shadow:0 8px 28px rgba(255,130,0,0.5);margin:5px;}
.btn-sec{background:linear-gradient(135deg,#37474f,#1c2a32);box-shadow:0 4px 14px rgba(0,0,0,0.4);}
#levelIntro{position:absolute;inset:0;z-index:45;display:none;flex-direction:column;justify-content:center;align-items:center;background:rgba(4,8,20,0.85);}
#liNum{font-size:86px;font-weight:800;color:#ffd54f;text-shadow:0 0 40px rgba(255,200,0,0.9);animation:pop 0.4s cubic-bezier(0.34,1.56,0.64,1);}
#liName{font-size:20px;color:#fff;margin-top:8px;font-weight:600;}
#liDesc{font-size:13px;color:rgba(255,200,80,0.8);margin-top:6px;}
@keyframes pop{from{transform:scale(0.2);opacity:0;}to{transform:scale(1);opacity:1;}}
.result-score{font-size:58px;font-weight:800;color:#ffd54f;text-shadow:0 0 30px rgba(255,210,50,0.8);margin:6px 0 4px;}
.result-detail{font-size:13px;color:rgba(255,255,255,0.7);line-height:2.1;margin-bottom:18px;}
.star-row{font-size:34px;margin-bottom:4px;}
#combo{position:absolute;top:70px;left:50%;transform:translateX(-50%);z-index:25;font-size:16px;font-weight:800;color:#ffd54f;pointer-events:none;opacity:0;text-shadow:0 0 10px rgba(255,200,0,0.8);white-space:nowrap;}
#combo.show{animation:comboAnim 1.4s ease-out forwards;}
@keyframes comboAnim{0%{opacity:1;transform:translateX(-50%) translateY(0);}80%{opacity:1;}100%{opacity:0;transform:translateX(-50%) translateY(-20px);}}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div class="top-ui" id="topUI" style="display:none;">
  <div class="ui-box ui-level">ด่าน <span id="levelEl">1</span>/3</div>
  <div class="ui-box">⏱ <span id="timeEl">30.0</span>s</div>
  <div class="ui-box">💯 <span id="scoreEl">100</span></div>
  <div class="ui-box">💥 <span id="hitsEl">0</span></div>
</div>
<div id="timerBar" style="display:none;"><div id="timerFill"></div></div>
<img id="lantern" src="images/khomjiw-open-eye.jpg" alt="โคม" draggable="false"/>
<div id="warning"></div>
<div id="combo"></div>

<!-- START -->
<div class="screen" id="startScreen">
  <div style="font-size:54px;margin-bottom:8px;">🏮</div>
  <div class="s-title">วิ่งโคมรอบบึง</div>
  <div class="s-sub">
    ลากโคมวิ่งรอบบึงแก่นนคร ทวนเข็มนาฬิกา<br>
    <strong style="color:#ffd54f;">3 ด่าน</strong> — ถนนแคบขึ้น + หลุมบ่อเพิ่ม<br>
    ออกนอกเส้น <strong style="color:#ff7070;">−5</strong> | โดนหลุม <strong style="color:#ff7070;">−10</strong><br>
    วิ่งเร็ว = <strong style="color:#ffd54f;">โบนัสเวลา ⚡</strong>
  </div>
  <button class="btn" id="startBtn">🏮 เริ่มวิ่ง!</button>
</div>

<!-- LEVEL INTRO -->
<div id="levelIntro">
  <div id="liNum">1</div>
  <div id="liName">ด่านที่ 1</div>
  <div id="liDesc"></div>
</div>

<!-- BETWEEN LEVELS -->
<div class="screen" id="betweenScreen" style="display:none;">
  <div class="s-title" id="btTitle">ด่าน 1 สำเร็จ!</div>
  <div class="star-row" id="btStars">⭐⭐⭐</div>
  <div class="result-score" id="btScore">100</div>
  <div class="result-detail" id="btDetail"></div>
  <button class="btn" id="nextBtn">ด่านต่อไป ▶</button>
</div>

<!-- FAIL -->
<div class="screen" id="failScreen" style="display:none;">
  <div style="font-size:50px;">😢</div>
  <div class="s-title" style="color:#ff6060;">หมดเวลา!</div>
  <div class="result-score" id="failScore" style="color:#ff7070;"></div>
  <div class="result-detail" id="failDetail"></div>
  <button class="btn" id="retryBtn">🔄 ลองใหม่ด่านนี้</button>
  <button class="btn btn-sec" id="restartBtn">↩ เริ่มด่าน 1</button>
</div>

<!-- FINAL -->
<div class="screen" id="finalScreen" style="display:none;">
  <div style="font-size:48px;margin-bottom:6px;">🏮🎉🏮</div>
  <div class="s-title">ครบ 3 ด่าน!</div>
  <div class="star-row" id="finalStars">⭐⭐⭐</div>
  <div class="result-score" id="finalScore">300</div>
  <div class="result-detail" id="finalDetail"></div>
  <button class="btn" id="playAgainBtn">🔄 เล่นอีกครั้ง</button>
</div>

<script>
const LEVELS=[
  {name:"ด่าน 1",desc:"ถนนกว้าง — อุ่นเครื่อง",  roadHW:0.068, time:30, obs:0 },
  {name:"ด่าน 2",desc:"ถนนแคบลง + หลุมบ่อ 5 จุด", roadHW:0.044, time:25, obs:5 },
  {name:"ด่าน 3",desc:"ถนนแคบมาก + หลุม 9 จุด",  roadHW:0.028, time:20, obs:9 },
];

const RAW=[
  [0.500,0.040],[0.558,0.042],[0.615,0.050],[0.668,0.065],[0.718,0.086],
  [0.762,0.110],[0.798,0.142],[0.825,0.180],[0.842,0.223],[0.851,0.270],
  [0.854,0.318],[0.852,0.366],[0.848,0.414],[0.843,0.460],[0.836,0.505],
  [0.825,0.547],[0.808,0.585],[0.786,0.620],[0.758,0.651],[0.724,0.677],
  [0.684,0.698],[0.640,0.713],[0.593,0.721],[0.544,0.724],[0.495,0.722],
  [0.447,0.715],[0.402,0.702],[0.360,0.683],[0.323,0.659],[0.291,0.630],
  [0.265,0.597],[0.245,0.561],[0.231,0.522],[0.222,0.481],[0.217,0.438],
  [0.215,0.394],[0.216,0.350],[0.220,0.305],[0.228,0.262],[0.240,0.221],
  [0.256,0.183],[0.278,0.148],[0.305,0.118],[0.338,0.092],[0.375,0.071],
  [0.416,0.055],[0.458,0.045],[0.500,0.040]
];

const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
let W,H,SF,trackPts=[],outerPts=[],innerPts=[],roadHW=0.068;
let playing=false,isDragging=false,currentLevel=0;
let score=100,hits=0,elapsed=0,timeLeft=30;
let timerInt=null,lapDone=false;
let lanternPt={x:0,y:0},lastIdx=0,totalProg=0;
let levelScores=[0,0,0],obstacles=[],lastHit=0,lastObs=0,cleanStreak=0;
let animId=null;

const lanternEl=document.getElementById('lantern');
const topUI=document.getElementById('topUI');
const timerBar=document.getElementById('timerBar');
const timerFill=document.getElementById('timerFill');
const timeEl=document.getElementById('timeEl'),scoreEl=document.getElementById('scoreEl');
const hitsEl=document.getElementById('hitsEl'),levelEl=document.getElementById('levelEl');
const warnEl=document.getElementById('warning'),comboEl=document.getElementById('combo');

// ---- MATH ----
function catmull(pts,iter){
  let p=pts.slice(0,pts.length-1);
  for(let k=0;k<iter;k++){
    const n=[],len=p.length;
    for(let j=0;j<len;j++){
      const p0=p[(j-1+len)%len],p1=p[j],p2=p[(j+1)%len],p3=p[(j+2)%len];
      n.push(p1);
      n.push({x:(-p0.x+9*p1.x+9*p2.x-p3.x)/16,y:(-p0.y+9*p1.y+9*p2.y-p3.y)/16});
    }
    p=n;
  }
  return p;
}
function offsetPts(pts,d){
  const n=pts.length;
  return pts.map((pt,i)=>{
    const prev=pts[(i-1+n)%n],next=pts[(i+1)%n];
    const tx=next.x-prev.x,ty=next.y-prev.y,l=Math.sqrt(tx*tx+ty*ty)||1;
    return{x:pt.x+(-ty/l)*d,y:pt.y+(tx/l)*d};
  });
}
function dist2(ax,ay,bx,by){return Math.sqrt((ax-bx)**2+(ay-by)**2);}
function closestIdx(x,y){
  let b=0,bd=Infinity;
  trackPts.forEach((p,i)=>{const d=(p.x-x)**2+(p.y-y)**2;if(d<bd){bd=d;b=i;}});
  return b;
}

// ---- RESIZE ----
function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  SF=Math.min(W,H);
  buildTrack(roadHW);
  // reposition obstacles
  obstacles.forEach(ob=>{
    const p=trackPts[ob.idx]||trackPts[0];
    ob.x=p.x;ob.y=p.y;ob.r=roadHW*SF*0.5;
  });
  if(playing)setLXY(lanternPt.x,lanternPt.y);
}

function buildTrack(hw){
  roadHW=hw;
  const raw=RAW.map(([nx,ny])=>({x:nx*W,y:ny*H}));
  trackPts=catmull(raw,5);
  outerPts=offsetPts(trackPts, hw*SF);
  innerPts =offsetPts(trackPts,-hw*SF);
}

// ---- STARS ----
let stars=null;
function mkStars(){stars=Array.from({length:80},()=>({x:Math.random(),y:Math.random()*0.55,r:Math.random()*1.4+0.3,a:Math.random()*0.6+0.3,tw:Math.random()*2+1}));}

// ---- DRAW ----
function makePath(pts){
  ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);
  ctx.closePath();
}

function drawScene(){
  ctx.clearRect(0,0,W,H);
  const t=Date.now()/1000;

  // Sky
  const bg=ctx.createRadialGradient(W/2,H*.15,0,W/2,H*.6,H);
  bg.addColorStop(0,'#1e3560');bg.addColorStop(0.5,'#0c1a2e');bg.addColorStop(1,'#050b18');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Stars
  if(stars)stars.forEach(s=>{
    ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${s.a*(0.6+0.4*Math.sin(t*s.tw))})`;ctx.fill();
  });

  // Water
  ctx.save();ctx.beginPath();makePath(innerPts);
  const wg=ctx.createRadialGradient(W*.5,H*.38,H*.02,W*.5,H*.4,H*.38);
  wg.addColorStop(0,'#6dd8ff');wg.addColorStop(0.4,'#0d7db8');wg.addColorStop(1,'#033a5e');
  ctx.fillStyle=wg;ctx.fill();ctx.restore();

  // Water shimmer
  ctx.save();ctx.beginPath();makePath(innerPts);ctx.clip();
  for(let i=0;i<5;i++){
    const sy=H*(0.22+Math.sin(t+i*1.2)*0.025);
    ctx.beginPath();ctx.moveTo(W*.2,sy+i*H*.06);ctx.lineTo(W*.8,sy+i*H*.06);
    ctx.strokeStyle=`rgba(255,255,255,${0.03+0.025*Math.sin(t*1.4+i)})`;ctx.lineWidth=H*.014;ctx.stroke();
  }
  ctx.restore();

  // Road
  ctx.save();ctx.beginPath();makePath(outerPts);ctx.clip();
  ctx.beginPath();makePath(outerPts);ctx.fillStyle='#484848';ctx.fill();
  ctx.globalCompositeOperation='destination-out';ctx.beginPath();makePath(innerPts);ctx.fill();
  ctx.restore();
  ctx.save();ctx.beginPath();makePath(outerPts);ctx.strokeStyle='#282828';ctx.lineWidth=3;ctx.stroke();ctx.restore();
  ctx.save();ctx.beginPath();makePath(innerPts);ctx.strokeStyle='#0a4a6a';ctx.lineWidth=3;ctx.stroke();ctx.restore();

  // Center dashes
  ctx.save();ctx.beginPath();makePath(trackPts);
  ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=2;ctx.setLineDash([14,11]);ctx.stroke();ctx.setLineDash([]);ctx.restore();

  // Island
  ctx.save();ctx.beginPath();ctx.ellipse(W*.492,H*.155,W*.064,H*.047,-0.1,0,Math.PI*2);
  ctx.fillStyle='#2e5e28';ctx.fill();ctx.strokeStyle='#1a3c16';ctx.lineWidth=2;ctx.stroke();
  ctx.font=`${Math.round(SF*.034)}px sans-serif`;ctx.textAlign='center';
  ctx.fillText('🌳',W*.47,H*.158+SF*.018);ctx.fillText('🌳',W*.515,H*.15+SF*.018);ctx.restore();

  // Progress trail
  if(playing&&totalProg>0){
    const done=Math.min(Math.floor(totalProg),trackPts.length-1);
    ctx.save();ctx.beginPath();ctx.moveTo(trackPts[0].x,trackPts[0].y);
    for(let i=1;i<=done;i++)ctx.lineTo(trackPts[i].x,trackPts[i].y);
    ctx.strokeStyle='rgba(255,213,79,0.3)';ctx.lineWidth=roadHW*SF*1.7;ctx.lineCap='round';ctx.stroke();ctx.restore();
  }

  // Obstacles
  obstacles.forEach(ob=>{
    if(ob.hit)return;
    const pulse=1+0.15*Math.sin(t*4+ob.idx*.5);
    ctx.save();ctx.beginPath();ctx.arc(ob.x,ob.y,ob.r*pulse,0,Math.PI*2);
    const og=ctx.createRadialGradient(ob.x,ob.y,0,ob.x,ob.y,ob.r*pulse);
    og.addColorStop(0,'rgba(255,80,80,0.9)');og.addColorStop(1,'rgba(160,0,0,0.15)');
    ctx.fillStyle=og;ctx.fill();
    ctx.strokeStyle='rgba(255,120,120,0.7)';ctx.lineWidth=2;ctx.stroke();
    ctx.font=`${Math.round(ob.r*1.4)}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🕳️',ob.x,ob.y);ctx.restore();
  });

  // Start dot
  const sp=trackPts[0];
  ctx.save();ctx.beginPath();ctx.arc(sp.x,sp.y,12,0,Math.PI*2);
  ctx.fillStyle='#ffd54f';ctx.fill();ctx.strokeStyle='#e65100';ctx.lineWidth=3;ctx.stroke();
  ctx.fillStyle='#000';ctx.font=`bold ${Math.round(SF*.022)}px Kanit`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('S',sp.x,sp.y);ctx.restore();

  // Lantern glow
  if(playing){
    const {x,y}=lanternPt;
    ctx.save();const g=ctx.createRadialGradient(x,y,4,x,y,40);
    g.addColorStop(0,'rgba(255,200,60,0.38)');g.addColorStop(1,'rgba(255,120,0,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,40,0,Math.PI*2);ctx.fill();ctx.restore();
  }
}

// ---- OBSTACLES ----
function spawnObs(count){
  obstacles=[];
  const n=trackPts.length,step=Math.floor(n/(count+1));
  for(let i=0;i<count;i++){
    const idx=step*(i+1)+Math.floor(step*0.3+Math.random()*step*0.4);
    const p=trackPts[Math.min(idx,n-1)];
    obstacles.push({idx,x:p.x,y:p.y,r:roadHW*SF*0.5,hit:false});
  }
}

// ---- LANTERN ----
function setLXY(x,y){
  lanternPt={x,y};
  lanternEl.style.left=x+'px';
  lanternEl.style.top=y+'px';
}

function isOnRoad(x,y){
  const hw=roadHW*SF,idx=closestIdx(x,y),cp=trackPts[idx];
  return dist2(x,y,cp.x,cp.y)<=hw*1.05;
}

function moveLantern(x,y){
  if(!playing||!isDragging)return;
  let nx=x,ny=y;
  if(!isOnRoad(x,y)){doHit();const s=trackPts[closestIdx(x,y)];nx=s.x;ny=s.y;}
  setLXY(nx,ny);
  checkObs(nx,ny);

  const idx=closestIdx(nx,ny),n=trackPts.length;
  let delta=idx-lastIdx;
  if(delta<-n/2)delta+=n;if(delta>n/2)delta-=n;
  if(delta>0){totalProg+=delta;cleanStreak+=delta;}
  else if(delta<0)cleanStreak=0;
  lastIdx=idx;

  if(cleanStreak>n*.22){
    showCombo('🔥 ไหลลื่น!');cleanStreak=0;
  }

  if(totalProg>=n*.97&&!lapDone){lapDone=true;endLevel(true);}
}

function doHit(){
  const now=Date.now();if(now-lastHit<650)return;lastHit=now;
  hits++;score=Math.max(0,score-5);
  hitsEl.innerText=hits;scoreEl.innerText=score;
  warnEl.classList.remove('flash');void warnEl.offsetWidth;warnEl.classList.add('flash');
  cleanStreak=0;
}

function checkObs(x,y){
  const now=Date.now();if(now-lastObs<500)return;
  obstacles.forEach(ob=>{
    if(ob.hit)return;
    if(dist2(x,y,ob.x,ob.y)<ob.r+16){
      ob.hit=true;lastObs=now;
      hits++;score=Math.max(0,score-10);
      hitsEl.innerText=hits;scoreEl.innerText=score;
      warnEl.classList.remove('flash');void warnEl.offsetWidth;warnEl.classList.add('flash');
      cleanStreak=0;
    }
  });
}

function showCombo(msg){
  comboEl.innerText=msg;
  comboEl.classList.remove('show');void comboEl.offsetWidth;comboEl.classList.add('show');
}

// ---- GAME FLOW ----
function hideAll(){
  ['startScreen','betweenScreen','failScreen','finalScreen'].forEach(id=>document.getElementById(id).style.display='none');
}

function showLvlIntro(lvl,cb){
  const li=document.getElementById('levelIntro');
  document.getElementById('liNum').innerText=lvl+1;
  document.getElementById('liName').innerText=LEVELS[lvl].name;
  document.getElementById('liDesc').innerText=LEVELS[lvl].desc;
  li.style.display='flex';
  setTimeout(()=>{li.style.display='none';cb();},1800);
}

function startLevel(lvl){
  currentLevel=lvl;
  const cfg=LEVELS[lvl];
  buildTrack(cfg.roadHW);
  spawnObs(cfg.obs);
  score=100;hits=0;elapsed=0;timeLeft=cfg.time;
  lapDone=false;isDragging=false;totalProg=0;lastIdx=0;
  cleanStreak=0;lastHit=0;lastObs=0;
  levelEl.innerText=lvl+1;scoreEl.innerText='100';hitsEl.innerText='0';
  timeEl.innerText=cfg.time.toFixed(1);timerFill.style.width='100%';
  const sp=trackPts[0];setLXY(sp.x,sp.y);
  lanternEl.style.display='block';topUI.style.display='flex';timerBar.style.display='block';
  playing=true;
  clearInterval(timerInt);
  const t0=Date.now();
  timerInt=setInterval(()=>{
    if(!playing)return;
    elapsed=(Date.now()-t0)/1000;
    timeLeft=Math.max(0,cfg.time-elapsed);
    timeEl.innerText=timeLeft.toFixed(1);
    timerFill.style.width=(timeLeft/cfg.time*100)+'%';
    if(timeLeft<=0)endLevel(false);
  },80);
}

function endLevel(success){
  playing=false;clearInterval(timerInt);
  lanternEl.style.display='none';topUI.style.display='none';timerBar.style.display='none';
  if(!success){
    document.getElementById('failScore').innerText=score;
    document.getElementById('failDetail').innerHTML=`ด่าน ${currentLevel+1} | เวลา ${elapsed.toFixed(1)}s | ชน ${hits} ครั้ง`;
    document.getElementById('failScreen').style.display='flex';return;
  }
  const timeBonus=Math.round(timeLeft*2);
  const fs=Math.min(100,score+timeBonus);
  levelScores[currentLevel]=fs;
  if(currentLevel<2){
    document.getElementById('btTitle').innerText=`ด่าน ${currentLevel+1} สำเร็จ! 🏮`;
    document.getElementById('btScore').innerText=fs;
    document.getElementById('btStars').innerText=fs>=90?'⭐⭐⭐':fs>=70?'⭐⭐':'⭐';
    document.getElementById('btDetail').innerHTML=`เวลา ${elapsed.toFixed(1)}s | ชน ${hits} ครั้ง<br>โบนัสเวลา <strong style="color:#ffd54f;">+${timeBonus}</strong>`;
    document.getElementById('betweenScreen').style.display='flex';
  } else {
    const total=levelScores.reduce((a,b)=>a+b,0);
    document.getElementById('finalScore').innerText=total;
    document.getElementById('finalStars').innerText=total>=260?'⭐⭐⭐':total>=200?'⭐⭐':total>0?'⭐':'💀';
    document.getElementById('finalDetail').innerHTML=`ด่าน 1: ${levelScores[0]} | ด่าน 2: ${levelScores[1]} | ด่าน 3: ${levelScores[2]}<br>รวม <strong style="color:#ffd54f;">${total}</strong> / 300 คะแนน`;
    document.getElementById('finalScreen').style.display='flex';
  }
}

// ---- INPUT ----
function getPt(e){const t=e.touches?e.touches[0]:e;return{x:t.clientX,y:t.clientY};}

canvas.addEventListener('touchstart',e=>{
  if(!playing)return;e.preventDefault();
  const p=getPt(e);
  if(dist2(p.x,p.y,lanternPt.x,lanternPt.y)<58)isDragging=true;
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  if(!isDragging)return;e.preventDefault();
  const p=getPt(e);moveLantern(p.x,p.y);
},{passive:false});
canvas.addEventListener('touchend',()=>isDragging=false,{passive:true});
canvas.addEventListener('mousedown',e=>{
  if(!playing)return;
  if(dist2(e.clientX,e.clientY,lanternPt.x,lanternPt.y)<58)isDragging=true;
});
canvas.addEventListener('mousemove',e=>{if(isDragging)moveLantern(e.clientX,e.clientY);});
canvas.addEventListener('mouseup',()=>isDragging=false);

// ---- BUTTONS ----
document.getElementById('startBtn').onclick=()=>{hideAll();showLvlIntro(0,()=>startLevel(0));};
document.getElementById('nextBtn').onclick=()=>{hideAll();showLvlIntro(currentLevel+1,()=>startLevel(currentLevel+1));};
document.getElementById('retryBtn').onclick=()=>{hideAll();showLvlIntro(currentLevel,()=>startLevel(currentLevel));};
document.getElementById('restartBtn').onclick=()=>{levelScores=[0,0,0];hideAll();showLvlIntro(0,()=>startLevel(0));};
document.getElementById('playAgainBtn').onclick=()=>{levelScores=[0,0,0];hideAll();showLvlIntro(0,()=>startLevel(0));};

// Emoji fallback
document.getElementById('lantern').onerror=function(){
  this.src='';this.style.cssText='position:absolute;width:48px;height:48px;transform:translate(-50%,-50%);pointer-events:none;z-index:30;font-size:38px;line-height:48px;text-align:center;display:none;';
  this.outerHTML=this.outerHTML.replace('<img','<div').replace('/>','>🏮</div>');
};

// ---- ANIM LOOP ----
function loop(){drawScene();requestAnimationFrame(loop);}

window.addEventListener('resize',resize);
mkStars();resize();loop();
</script>
</body>
