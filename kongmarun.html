<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>เกมวิ่งโคม</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
}

body{
  margin:0;
  overflow:hidden;
  font-family:'Kanit',sans-serif;
  background:#111;
}

#game{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:
    radial-gradient(circle at top,#28415d 0%,#15253a 35%,#0a111c 100%);
}

/* หัวเกม */
.top-ui{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  z-index:20;
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.ui-box{
  background:rgba(0,0,0,0.45);
  color:#fff;
  padding:10px 16px;
  border-radius:16px;
  backdrop-filter:blur(6px);
  font-size:15px;
  box-shadow:0 4px 14px rgba(0,0,0,0.35);
}

#startScreen,
#gameOver{
  position:absolute;
  inset:0;
  z-index:50;
  background:rgba(0,0,0,0.72);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:#fff;
  text-align:center;
  padding:20px;
}

.title{
  font-size:42px;
  font-weight:700;
  margin-bottom:10px;
  color:#ffd54f;
  text-shadow:0 4px 18px rgba(255,180,0,0.5);
}

.sub{
  opacity:.9;
  margin-bottom:28px;
  line-height:1.5;
}

.btn{
  border:none;
  border-radius:18px;
  padding:16px 28px;
  font-size:18px;
  font-family:'Kanit',sans-serif;
  font-weight:700;
  cursor:pointer;
  background:linear-gradient(135deg,#ff9800,#ff5722);
  color:#fff;
  box-shadow:0 8px 24px rgba(255,120,0,0.45);
}

#map{
  position:absolute;
  inset:0;
}

/* ถนน */
.track{
  position:absolute;
  left:50%;
  top:50%;
  width:78vmin;
  height:78vmin;
  transform:translate(-50%,-50%);
  border-radius:50%;
  border:38px solid #5b5b5b;
  box-shadow:
    0 0 0 10px #2f2f2f,
    inset 0 0 25px rgba(0,0,0,0.4);
}

/* เส้นในถนน */
.track::before{
  content:"";
  position:absolute;
  inset:-22px;
  border-radius:50%;
  border:4px dashed rgba(255,255,255,0.55);
}

/* น้ำบึง */
.lake{
  position:absolute;
  left:50%;
  top:50%;
  width:54vmin;
  height:54vmin;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:
    radial-gradient(circle at 30% 30%,#5fd3ff,#0d7db8 70%);
  box-shadow:inset 0 0 25px rgba(255,255,255,0.2);
}

/* ศาลเจ้า */
.shrine{
  position:absolute;
  right:10%;
  top:10%;
  width:82px;
  height:82px;
  border-radius:20px;
  background:linear-gradient(135deg,#ff7043,#d32f2f);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:42px;
  box-shadow:0 8px 18px rgba(0,0,0,0.35);
  z-index:5;
}

/* โคม */
#runner{
  position:absolute;
  width:58px;
  height:58px;
  margin-left:-29px;
  margin-top:-29px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:42px;
  z-index:10;
  filter:drop-shadow(0 0 12px rgba(255,170,0,0.9));
  transition:transform .08s linear;
}

/* เอฟเฟกต์ชน */
.hit{
  animation:shake .18s linear 2;
}

@keyframes shake{
  0%{transform:translateX(-2px);}
  50%{transform:translateX(2px);}
  100%{transform:translateX(-2px);}
}

/* เส้นขอบแดง */
.warning{
  position:absolute;
  inset:0;
  border:8px solid rgba(255,0,0,0);
  pointer-events:none;
  z-index:100;
}

.warning.show{
  animation:flash .35s;
}

@keyframes flash{
  0%{border-color:rgba(255,0,0,0.85);}
  100%{border-color:rgba(255,0,0,0);}
}

#touchArea{
  position:absolute;
  inset:0;
  z-index:15;
}

.result-time{
  font-size:22px;
  margin:10px 0 25px;
  color:#ffd54f;
}

</style>
</head>
<body>

<div id="game">

  <div id="map">
    <div class="track"></div>
    <div class="lake"></div>
    <div class="shrine">🏮</div>
  </div>

  <div class="top-ui">
    <div class="ui-box">
      เวลา: <span id="time">15</span>s
    </div>

    <div class="ui-box">
      ชนขอบ: <span id="hits">0</span>
    </div>
  </div>

  <div id="runner">🏮</div>

  <div class="warning" id="warning"></div>

  <div id="touchArea"></div>

  <!-- START -->
  <div id="startScreen">
    <div class="title">เกมวิ่งโคม</div>

    <div class="sub">
      ลากโคมวิ่งรอบบึงให้ครบ<br>
      ห้ามออกนอกถนน และต้องทันเวลา
    </div>

    <button class="btn" onclick="startGame()">
      เริ่มวิ่ง
    </button>
  </div>

  <!-- GAME OVER -->
  <div id="gameOver" style="display:none;">
    <div class="title" id="resultTitle">สำเร็จ!</div>

    <div class="result-time" id="resultText"></div>

    <button class="btn" onclick="restartGame()">
      เล่นอีกครั้ง
    </button>
  </div>

</div>

<script>

const runner = document.getElementById("runner");
const touchArea = document.getElementById("touchArea");
const timeEl = document.getElementById("time");
const hitsEl = document.getElementById("hits");

const gameOver = document.getElementById("gameOver");
const resultTitle = document.getElementById("resultTitle");
const resultText = document.getElementById("resultText");

const warning = document.getElementById("warning");

let playing = false;
let timeLeft = 15;
let timer = null;
let hits = 0;

let angle = -90;
let completed = false;

const centerX = window.innerWidth / 2;
const centerY = window.innerHeight / 2;

const radius = Math.min(window.innerWidth, window.innerHeight) * 0.39;

function updateRunner(){

  const rad = angle * Math.PI / 180;

  const x = centerX + radius * Math.cos(rad);
  const y = centerY + radius * Math.sin(rad);

  runner.style.left = x + "px";
  runner.style.top = y + "px";
}

updateRunner();

function startGame(){

  document.getElementById("startScreen").style.display = "none";

  playing = true;
  timeLeft = 15;
  hits = 0;
  angle = -90;
  completed = false;

  hitsEl.innerText = hits;
  timeEl.innerText = timeLeft;

  updateRunner();

  clearInterval(timer);

  timer = setInterval(() => {

    timeLeft--;

    timeEl.innerText = timeLeft;

    if(timeLeft <= 0){

      endGame(false);

    }

  },1000);

}

function endGame(success){

  playing = false;

  clearInterval(timer);

  gameOver.style.display = "flex";

  if(success){

    resultTitle.innerText = "วิ่งสำเร็จ!";
    resultText.innerHTML =
      "ใช้เวลา " + (15 - timeLeft) + " วินาที<br>ชนขอบ " + hits + " ครั้ง";

  }else{

    resultTitle.innerText = "ไม่ทันเวลา";
    resultText.innerHTML =
      "ลองใหม่อีกครั้ง";
  }

}

function restartGame(){

  gameOver.style.display = "none";

  startGame();

}

/* ลากโคม */
let lastX = null;

touchArea.addEventListener("touchmove",(e)=>{

  if(!playing) return;

  const touch = e.touches[0];

  if(lastX !== null){

    const diff = touch.clientX - lastX;

    angle += diff * 0.45;

    if(angle > 270 && !completed){

      completed = true;
      endGame(true);
      return;
    }

    updateRunner();

    /* สุ่มชนขอบ */
    if(Math.random() < 0.03){

      hits++;

      hitsEl.innerText = hits;

      warning.classList.remove("show");
      void warning.offsetWidth;
      warning.classList.add("show");

      runner.classList.remove("hit");
      void runner.offsetWidth;
      runner.classList.add("hit");

    }

  }

  lastX = touch.clientX;

},{passive:true});

touchArea.addEventListener("touchend",()=>{

  lastX = null;

});

</script>

</body>
</html>
