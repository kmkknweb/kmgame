<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ศาลเจ้าพาวิ่ง & เกมส์สนุก</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(to bottom, #FFF5E1, #FFD699);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    color: #333;
  }

  header {
    text-align: center;
    padding: 20px 10px 10px 10px;
  }

  header img {
    width: 120px;
    height: auto;
  }

  header h1 {
    margin: 10px 0 5px 0;
    font-size: 24px;
    color: #B22222; /* แดงสด */
  }

  header h2 {
    margin: 0;
    font-size: 18px;
    color: #FF8C00; /* ส้มสด */
  }

  .game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 20px;
    width: 90%;
    max-width: 800px;
    margin-top: 30px;
  }

  .game-button {
    background: linear-gradient(to bottom right, #FFD700, #FF6347);
    border: none;
    border-radius: 15px;
    padding: 20px;
    font-size: 16px;
    color: #fff;
    text-align: center;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }

  .game-button:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  }

  footer {
    margin-top: auto;
    padding: 15px;
    text-align: center;
    font-size: 14px;
    color: #555;
  }

  @media (max-width: 500px) {
    .game-button {
      padding: 15px;
      font-size: 14px;
    }
  }
</style>
</head>
<body>
<header>
  <img src="images/logo.png" alt="สมาคมฯปึงเถ่ากงม่า Logo">
  <h1>สมาคมฯปึงเถ่ากงม่า</h1>
  <h2>ศาลเจ้าพาวิ่ง & เกมส์สนุก</h2>
</header>

<div class="game-grid">
  <a href="https://kmgame.github.io/" class="game-button">เกมเสี่ยงเซียมซี</a>
  <a href="https://kmgame.github.io/" class="game-button">เกมหมุนวงล้อ</a>
  <a href="https://kmgame.github.io/" class="game-button">เกมดูลายมือ</a>
  <a href="https://kmgame.github.io/" class="game-button">เกมดูโหงวเฮ้ง</a>
  <a href="https://kmgame.github.io/" class="game-button">เกมวิ่งโคม</a>
</div>

<footer>
  © 2026 สมาคมฯปึงเถ่ากงม่า | All Rights Reserved
</footer>
</body>
</html>
