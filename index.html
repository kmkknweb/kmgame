<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ศาลเจ้าพาวิ่ง & เกมส์สนุก</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Kanit', sans-serif;
  background: linear-gradient(to bottom, #FFF8E1, #FFECB3);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  color: #333;
}

header {
  text-align: center;
  padding: 20px 10px 10px 10px;
}

header h1 {
  margin: 10px 0 5px 0;
  font-size: 32px;
  color: #D32F2F;
  font-weight: 700;
  text-shadow: 1px 1px 3px #FFA500;
}

header h2 {
  margin: 0;
  font-size: 22px;
  color: #FF9800;
  font-weight: 600;
  text-shadow: 1px 1px 2px #FFC107;
}

.game-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 25px;
  width: 90%;
  max-width: 900px;
  margin-top: 30px;
}

.game-button {
  background: linear-gradient(145deg, #FFB74D, #FF8A65);
  border: none;
  border-radius: 25px;
  padding: 25px 15px;
  font-size: 16px;
  color: #fff;
  text-align: center;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.game-button:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 25px rgba(0,0,0,0.4);
  filter: brightness(1.1);
}

/* CSS Icon */
.game-button::before {
  content: '';
  display: block;
  width: 60px;
  height: 60px;
  margin-bottom: 12px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #FFF, #FFD700);
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* icon แยกตามเกม */
.game-button:nth-child(1)::before { content:"🎴"; font-size: 40px; display: flex; align-items:center; justify-content:center; text-align:center; }
.game-button:nth-child(2)::before { content:"🎡"; font-size: 40px; display: flex; align-items:center; justify-content:center; text-align:center; }
.game-button:nth-child(3)::before { content:"✋"; font-size: 40px; display: flex; align-items:center; justify-content:center; text-align:center; }
.game-button:nth-child(4)::before { content:"👤"; font-size: 40px; display: flex; align-items:center; justify-content:center; text-align:center; }
.game-button:nth-child(5)::before { content:"🏮"; font-size: 40px; display: flex; align-items:center; justify-content:center; text-align:center; }

footer {
  margin-top: auto;
  padding: 15px;
  text-align: center;
  font-size: 14px;
  color: #555;
}

@media (max-width: 500px) {
  .game-button {
    padding: 18px 10px;
    font-size: 14px;
  }
  .game-button::before { width: 45px; height: 45px; margin-bottom: 8px; font-size: 30px; }
}
</style>
</head>
<body>
<header>
  <h1>สมาคมฯปึงเถ่ากงม่า</h1>
  <h2>ศาลเจ้าพาวิ่ง & เกมส์สนุก</h2>
</header>
<div class="game-grid">
  <a href="xiamsi-reward.html#shake" class="game-button"> เสี่ยงเซียมซี</a>
  <a href="xiamsi-reward.html#wheel" class="game-button">หมุนวงล้อโชคลาภ</a>
  <a href="handwriting.html" class="game-button">เกมดูลายมือ</a>
  <a href="fiveface.html" class="game-button">เกมดูโหงวเฮ้ง</a>
  <a href="lantern.html" class="game-button">เกมวิ่งโคม</a>
</div>

<footer>
  © 2026 สมาคมฯปึงเถ่ากงม่า | All Rights Reserved
</footer>

<script>
  window.onload = function() {
  const hash = window.location.hash;
  const shake = document.getElementById('screen-shake');
  const wheel = document.getElementById('screen-wheel');

  if(hash === '#shake') {
    if(shake) shake.style.display = 'block';
    if(wheel) wheel.style.display = 'none';
  } else if(hash === '#wheel') {
    if(shake) shake.style.display = 'none';
    if(wheel) wheel.style.display = 'block';
  } else {
    // default: ทั้งสองเกมซ่อน
    if(shake) shake.style.display = 'none';
    if(wheel) wheel.style.display = 'none';
  }
};
</script>
  
</body>
</html>
