<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>เสี่ยงเซียมซี — อากงอาม่าให้โชค</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+Thai:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#D4A017;--gold2:#F5C842;--gold-dim:rgba(212,160,23,0.25);
  --red:#B91C1C;--red2:#EF4444;
  --bg:#2A1606;--bg2:#5A330C;--bg3:#FFF0C2;
  --text:#5A2A05;--muted:#7A4A14;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:linear-gradient(180deg,#FFF4CE 0%,#F4C86A 46%,#9B5A16 100%);color:var(--text);font-family:'Noto Sans Thai',sans-serif}
.bg-amb{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 72% 46% at 50% 5%,rgba(255,248,216,.95) 0%,rgba(255,222,128,.55) 45%,transparent 72%),
             radial-gradient(ellipse 58% 44% at 50% 62%,rgba(255,206,84,.42) 0%,rgba(205,112,18,.18) 58%,transparent 78%),
             linear-gradient(180deg,rgba(255,247,214,.72) 0%,rgba(239,184,74,.48) 48%,rgba(120,62,12,.62) 100%)}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.star{position:absolute;width:2px;height:2px;background:rgba(255,255,230,.72);border-radius:50%;box-shadow:0 0 8px rgba(255,230,120,.75);animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:.1;transform:scale(1)}50%{opacity:.8;transform:scale(1.4)}}
.screen{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s ease}
.screen.active{opacity:1;pointer-events:all}

/* LOADING */
#screen-loading{gap:18px}
.ll{font-size:56px;animation:sway 2.4s ease-in-out infinite;filter:drop-shadow(0 0 24px rgba(212,160,23,.5))}
@keyframes sway{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
.lt{font-size:13px;letter-spacing:4px;color:var(--muted)}
.ld{display:flex;gap:6px}
.ld span{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:bd 1.1s ease-in-out infinite}
.ld span:nth-child(2){animation-delay:.18s}.ld span:nth-child(3){animation-delay:.36s}
@keyframes bd{0%,80%,100%{transform:translateY(0);opacity:.3}40%{transform:translateY(-7px);opacity:1}}

/* ERROR */
#screen-error{gap:14px;padding:32px;text-align:center}
.ei{font-size:46px}.et{font-size:17px;color:var(--red2);font-weight:600}
.em{font-size:13px;color:var(--muted);line-height:1.75;max-width:300px}
.btn-retry{padding:12px 28px;border-radius:12px;cursor:pointer;background:var(--bg3);border:1px solid var(--gold-dim);color:var(--gold);font-family:inherit;font-size:14px}

/* SHAKE */
#screen-shake{justify-content:flex-start;padding:16px 20px 18px}
.top-bar{width:100%;display:flex;align-items:center;justify-content:space-between}
.app-title{font-family:'Noto Serif TC',serif;font-size:20px;font-weight:900;color:#8A0008;letter-spacing:5px;text-shadow:0 1px 0 rgba(255,255,255,.45),0 0 18px rgba(255,220,90,.45)}
.rbadge{font-size:11px;color:#7A4A14;background:rgba(255,244,204,.7);border:1px solid rgba(122,74,20,.18);border-radius:20px;padding:5px 12px;letter-spacing:1px}
.stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:10px;gap:0;position:relative;width:100%}
.shake-hint{font-size:19px;font-weight:800;color:#6F3D0E;letter-spacing:2px;margin-bottom:8px;margin-top:0;text-align:center;transition:color .3s;font-family:'Noto Serif TC',serif !important;text-shadow:0 1px 0 rgba(255,255,255,.45)}
.shake-hint.lit{color:#B91C1C;text-shadow:0 0 12px rgba(255,230,120,.65)}

/* Cup scene */
.cup-scene{position:relative;width:250px;height:350px;margin-bottom:12px;display:flex;align-items:flex-end;justify-content:center}
.cup-scene::before{content:'';position:absolute;left:50%;bottom:12px;width:210px;height:42px;transform:translateX(-50%);border-radius:50%;background:radial-gradient(ellipse at center,rgba(245,200,66,.22),rgba(185,28,28,.12) 42%,transparent 72%);filter:blur(6px);opacity:.9}
.cup-svg-main{width:235px;height:350px;overflow:visible;filter:drop-shadow(0 18px 38px rgba(0,0,0,.82)) drop-shadow(0 0 22px rgba(212,160,23,.16))}
.cup-svg-main.shaking{animation:cr .22s ease-in-out infinite;transform-origin:50% 88%}
@keyframes cr{0%,100%{transform:rotate(0deg)}20%{transform:rotate(-8deg) translateX(-4px)}50%{transform:rotate(8deg) translateX(4px)}75%{transform:rotate(-5deg) translateX(-2px)}}
.fly-stick{position:absolute;left:50%;top:4px;transform:translateX(-50%);width:15px;height:140px;border-radius:3px 3px 2px 2px;opacity:0;z-index:30;cursor:pointer;
  background:linear-gradient(to bottom,#C90012 0%,#D90015 45%,#FFF1BC 45%,#F5D990 100%);
  box-shadow:0 8px 22px rgba(0,0,0,.42),inset -2px 0 3px rgba(0,0,0,.28),inset 2px 0 3px rgba(255,255,255,.22)}
.fly-stick::after{content:'✦';position:absolute;left:0;right:0;top:18px;text-align:center;font-size:14px;color:#FFE66A;text-shadow:0 1px 1px rgba(0,0,0,.4)}
.fly-stick::before{content:'';position:absolute;left:0;right:0;top:45%;height:2px;background:rgba(100,35,0,.28)}

/* Ring */
.ring-wrap{position:relative;width:118px;min-height:118px;margin-top:2px;display:flex;align-items:center;justify-content:center;z-index:20}
.ring-svg{position:absolute;inset:14px;transform:rotate(-90deg);overflow:visible}
.ring-bg{fill:none;stroke:rgba(122,74,20,.18);stroke-width:5}
.ring-track{fill:none;stroke:#B91C1C;stroke-width:5;stroke-linecap:round;stroke-dasharray:251;stroke-dashoffset:251;transition:stroke-dashoffset .07s linear;filter:drop-shadow(0 0 7px rgba(185,28,28,.35))}
.ring-core{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:2px}
.ring-pct{font-family:'Noto Serif TC',serif;font-size:30px;line-height:1;font-weight:900;color:#7A2A00;text-shadow:0 1px 0 rgba(255,255,255,.55),0 0 12px rgba(255,221,105,.45)}
.ring-lbl{font-size:15px;line-height:1;font-weight:800;color:#8A0008;letter-spacing:3px;margin-top:8px;text-shadow:0 1px 0 rgba(255,255,255,.5)}
.btn-perm{margin-top:8px;padding:12px 26px;background:rgba(255,244,204,.82);border:1px solid rgba(185,28,28,.25);border-radius:12px;color:#8A0008;font-family:inherit;font-size:16px;cursor:pointer;display:none;position:relative;z-index:50;-webkit-appearance:none;box-shadow:0 8px 24px rgba(120,62,12,.18)}
.btn-tap{margin-top:10px;padding:16px 36px;border-radius:50px;background:linear-gradient(135deg,var(--red) 0%,#7A0A0A 100%);border:2px solid rgba(212,160,23,.4);color:white;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;display:none;position:relative;z-index:50}
.btn-back{margin-top:6px;background:rgba(255,244,204,.55);border:1px solid rgba(122,74,20,.16);border-radius:999px;padding:7px 14px;color:#7A4A14;font-family:inherit;font-size:12px;letter-spacing:1px;cursor:pointer;position:relative;z-index:25}

/* Anims */
@keyframes fly-out{0%{opacity:1;transform:translateX(-50%) translateY(0) rotate(0deg)}20%{opacity:1;transform:translateX(-44%) translateY(-70px) rotate(10deg)}50%{opacity:1;transform:translateX(-38%) translateY(-160px) rotate(24deg)}75%{opacity:.9;transform:translateX(-32%) translateY(-110px) rotate(38deg)}100%{opacity:0;transform:translateX(-24%) translateY(-40px) rotate(55deg)}}
@keyframes stick-land{0%{opacity:0;transform:translateY(-80px) rotate(-6deg)}55%{opacity:1;transform:translateY(6px) rotate(1deg)}75%{transform:translateY(-3px) rotate(-.5deg)}100%{opacity:1;transform:translateY(0) rotate(0deg)}}
@keyframes card-up{0%{opacity:0;transform:translateY(28px) scale(.95)}100%{opacity:1;transform:translateY(0) scale(1)}}

/* Confetti */
.cf{position:fixed;pointer-events:none;z-index:999;animation:cf-fall var(--dur,1.6s) ease-out forwards var(--del,0s)}
@keyframes cf-fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* Reveal */
.reveal-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;cursor:pointer;padding:24px}
.big-stick{width:52px;height:240px;border-radius:6px 6px 4px 4px;background:linear-gradient(to bottom,#C90012 0%,#D90015 38%,#FFF1BC 38%,#F5D990 100%);box-shadow:0 12px 38px rgba(0,0,0,.52),inset -4px 0 6px rgba(0,0,0,.28),inset 4px 0 6px rgba(255,255,255,.22);position:relative;animation:stick-land .65s cubic-bezier(.34,1.56,.64,1) forwards}
.bsn{position:absolute;left:0;right:0;height:3px;background:rgba(100,35,0,.28)}
.bsc{position:absolute;left:0;right:0;top:12%;display:flex;align-items:center;justify-content:center}
.bsc span{font-family:'Noto Serif TC',serif;font-size:28px;font-weight:900;color:#FFE66A;text-shadow:0 2px 0 rgba(80,0,0,.4),0 0 14px rgba(255,230,106,.55)}
.tap-lbl{font-size:16px;font-weight:700;color:#8A3A00;letter-spacing:2px;text-shadow:0 1px 0 rgba(255,255,255,.5);animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.7}50%{opacity:1}}
.prize-card{width:min(90vw,340px);background:linear-gradient(160deg,#FFF6D8 0%,#F0C873 100%);border:1px solid rgba(126,72,8,.28);border-radius:22px;padding:22px 20px;text-align:center;display:none;box-shadow:0 20px 60px rgba(90,49,6,.24),0 0 0 1px rgba(255,255,255,.24)}
.plbl{font-size:14px;font-weight:700;color:#6A3D06;margin-bottom:6px;text-shadow:0 1px 0 rgba(255,255,255,.6)}
.pname{font-size:28px;font-weight:900;color:#7B0007;font-family:'Noto Serif TC',serif;text-shadow:0 2px 0 rgba(255,236,174,.8),0 0 18px rgba(255,214,88,.56);margin-bottom:6px}
.psub{font-size:13px;color:#5B3A0D;margin-bottom:14px}
.btn-again{padding:12px 28px;border-radius:14px;background:linear-gradient(135deg,var(--red) 0%,#7A0A0A 100%);border:1px solid rgba(212,160,23,.4);color:#FFF8DC;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 6px 22px rgba(185,28,28,.38)}

/* === PRO GOLD UI OVERRIDE === */
:root{--text:#3B2405;--muted:#5B3A0D;--gold:#9B640B;--gold2:#C17A00;--bg3:#FFF1C7;}
html,body,button,input,select,textarea,.screen,.btn-retry,.btn-back,.btn-perm,.btn-tap,.btn-again{font-family:'Noto Sans Thai','Noto Serif TC',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif !important;}
.app-title,.shake-hint,.ring-pct,.pname,.bsc span,.plbl{font-family:'Noto Serif TC','Noto Sans Thai',serif !important;}
html,body{color:#3B2405 !important;background:radial-gradient(ellipse 75% 46% at 50% 0%,#FFF9E8 0%,#FFE8A6 42%,rgba(255,232,166,0) 70%),linear-gradient(180deg,#FFF2C6 0%,#F4C46B 46%,#B46C18 100%) !important;}
.bg-amb{background:radial-gradient(ellipse 78% 48% at 50% 4%,rgba(255,253,238,.96) 0%,rgba(255,232,156,.62) 47%,transparent 74%),radial-gradient(ellipse 52% 34% at 18% 88%,rgba(255,242,190,.38) 0%,transparent 66%),radial-gradient(ellipse 42% 30% at 88% 82%,rgba(180,99,15,.22) 0%,transparent 62%) !important;}
.star{background:rgba(130,75,8,.42) !important;box-shadow:0 0 6px rgba(255,240,170,.55)}
.lt,.em,.psub{color:#5B3A0D !important;text-shadow:0 1px 0 rgba(255,255,255,.48)}
.et{color:#9B111E !important;text-shadow:0 1px 0 rgba(255,255,255,.48)}
.app-title{color:#7B0007 !important;text-shadow:0 2px 0 rgba(255,235,178,.75),0 0 18px rgba(255,213,90,.58) !important}
.rbadge{color:#5B2A00 !important;background:rgba(255,246,214,.86) !important;border:1px solid rgba(132,77,14,.28) !important;box-shadow:0 4px 16px rgba(120,68,8,.12),inset 0 1px 0 rgba(255,255,255,.68)}
.shake-hint{color:#4A2A07 !important;font-size:20px !important;line-height:1.34 !important;font-weight:900 !important;letter-spacing:1.2px !important;text-shadow:0 2px 0 rgba(255,248,218,.78),0 0 14px rgba(255,218,100,.48) !important;}
.shake-hint.lit{color:#8A0008 !important;text-shadow:0 2px 0 rgba(255,238,177,.82),0 0 18px rgba(255,220,90,.75) !important}
.ring-wrap{width:122px !important;min-height:126px !important;margin-top:6px !important;margin-bottom:0 !important;}
.ring-svg{inset:12px !important}
.ring-bg{stroke:rgba(82,45,6,.22) !important}
.ring-track{stroke:#9B111E !important;filter:drop-shadow(0 0 7px rgba(155,17,30,.42)) !important}
.ring-core{gap:5px !important;transform:translateY(1px)}
.ring-pct{color:#3E2100 !important;font-size:32px !important;line-height:.95 !important;font-weight:900 !important;letter-spacing:.2px !important;text-shadow:0 2px 0 rgba(255,246,206,.82),0 0 14px rgba(255,216,96,.56) !important;}
.ring-lbl{color:#7B0007 !important;font-size:14px !important;line-height:1 !important;font-weight:900 !important;letter-spacing:3px !important;margin-top:4px !important;text-shadow:0 1px 0 rgba(255,240,188,.76),0 0 10px rgba(255,218,100,.46) !important;}
.btn-back{color:#4A2A07 !important;background:rgba(255,246,214,.74) !important;border:1px solid rgba(108,61,8,.25) !important;font-weight:800 !important;text-shadow:0 1px 0 rgba(255,255,255,.5) !important;box-shadow:0 6px 18px rgba(95,53,8,.12),inset 0 1px 0 rgba(255,255,255,.65) !important;}
.btn-again,.btn-tap{color:#FFF8DC !important;text-shadow:0 2px 2px rgba(60,0,0,.42) !important;}
.btn-perm,.btn-retry{color:#7B0007 !important;background:rgba(255,246,214,.86) !important;border-color:rgba(123,0,7,.25) !important;font-weight:800 !important;text-shadow:0 1px 0 rgba(255,255,255,.55) !important;}
.prize-card{background:linear-gradient(160deg,#FFF6D8 0%,#F0C873 100%) !important;border:1px solid rgba(126,72,8,.28) !important;color:#3B2405 !important;box-shadow:0 20px 60px rgba(90,49,6,.24),0 0 0 1px rgba(255,255,255,.24) !important;}
.plbl{color:#6A3D06 !important;font-weight:900 !important;text-shadow:0 1px 0 rgba(255,255,255,.6)}
.pname{color:#7B0007 !important;text-shadow:0 2px 0 rgba(255,236,174,.8),0 0 18px rgba(255,214,88,.56) !important}
</style>
</head>
<body>
<div class="bg-amb"></div>
<div class="stars" id="stars"></div>

<!-- LOADING -->
<div id="screen-loading" class="screen active">
  <div class="ll">🏮</div>
  <div class="lt">กำลังโหลดรางวัล</div>
  <div class="ld"><span></span><span></span><span></span></div>
</div>

<!-- ERROR -->
<div id="screen-error" class="screen">
  <div class="ei">⚠️</div>
  <div class="et">โหลดข้อมูลไม่สำเร็จ</div>
  <div class="em" id="errMsg">ไม่สามารถเชื่อมต่อ Apps Script ได้</div>
  <button class="btn-retry" onclick="boot()">ลองใหม่</button>
</div>

<!-- SHAKE -->
<div id="screen-shake" class="screen">
  <div class="top-bar">
    <div class="app-title">籤 เซียมซี</div>
    <div class="rbadge" id="rewardBadge">— รางวัล</div>
  </div>
  <div class="stage">
    <div class="shake-hint" id="shakeHint">เขย่ามือถือเพื่อเสี่ยงไม้</div>
    <div class="cup-scene">
      <div class="fly-stick" id="flyStick"></div>
      <svg class="cup-svg-main" id="cupSvgMain" viewBox="0 0 220 350" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="insideCup">
            <path d="M34 34 C58 18,162 18,186 34 L178 286 L42 286 Z"/>
          </clipPath>
          <linearGradient id="redCupBody" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#8A0008"/><stop offset="16%" stop-color="#D00012"/><stop offset="38%" stop-color="#FF3143"/><stop offset="52%" stop-color="#FF6A78"/><stop offset="68%" stop-color="#E00017"/><stop offset="100%" stop-color="#760006"/>
          </linearGradient>
          <linearGradient id="redCupSide" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FF071F"/><stop offset="100%" stop-color="#99000B"/>
          </linearGradient>
          <linearGradient id="rimRed" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#690006"/><stop offset="28%" stop-color="#D80013"/><stop offset="50%" stop-color="#FF4050"/><stop offset="72%" stop-color="#C60010"/><stop offset="100%" stop-color="#5B0005"/>
          </linearGradient>
          <linearGradient id="creamStick" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#9C7632"/><stop offset="10%" stop-color="#D4B36B"/><stop offset="28%" stop-color="#FFF1BC"/><stop offset="50%" stop-color="#FFF7D8"/><stop offset="72%" stop-color="#E7C77A"/><stop offset="100%" stop-color="#8B662B"/>
          </linearGradient>
          <linearGradient id="redStickHead" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#860005"/><stop offset="25%" stop-color="#C60010"/><stop offset="50%" stop-color="#F01428"/><stop offset="75%" stop-color="#B7000D"/><stop offset="100%" stop-color="#6C0004"/>
          </linearGradient>
          <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7A4A04"/><stop offset="25%" stop-color="#E3B141"/><stop offset="50%" stop-color="#FFF0A8"/><stop offset="75%" stop-color="#D09A24"/><stop offset="100%" stop-color="#6A3E03"/>
          </linearGradient>
          <radialGradient id="appGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="rgba(245,200,66,.6)"/><stop offset="45%" stop-color="rgba(185,28,28,.22)"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/>
          </radialGradient>
          <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="4"/></filter>
          <filter id="stickShadow" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="5" stdDeviation="3" flood-color="#000" flood-opacity=".45"/></filter>
          <style>
            @keyframes wob {0%,100%{transform:rotate(0deg) translateY(0) scale(1);}30%{transform:rotate(-8deg) translateY(-3px) scale(1.012);}70%{transform:rotate(8deg) translateY(-1px) scale(1.012);}}
            .wob-grp.wobbling > g{animation:wob .18s ease-in-out infinite;transform-box:fill-box;transform-origin:bottom center;}
            .star-mark{font-family:Noto Serif TC,serif;font-weight:900;fill:#FFE66A;font-size:14px;text-anchor:middle;dominant-baseline:middle;filter:drop-shadow(0 1px 1px rgba(0,0,0,.3));}
          </style>
        </defs>
        <ellipse cx="110" cy="326" rx="84" ry="17" fill="url(#appGlow)" opacity=".75"/>
        <ellipse cx="110" cy="306" rx="76" ry="12" fill="rgba(0,0,0,.45)" filter="url(#softBlur)"/>
        <ellipse cx="110" cy="148" rx="78" ry="23" fill="#330006" opacity=".95"/>
        <ellipse cx="110" cy="151" rx="67" ry="16" fill="rgba(0,0,0,.75)"/>
        <g clip-path="url(#insideCup)" class="wob-grp" id="sticksBunch" filter="url(#stickShadow)">
          <g transform="rotate(-19 52 286)"><rect x="46" y="92" width="13" height="194" rx="2" fill="url(#creamStick)"/><path d="M46 92 h13 v80 h-13 z" fill="url(#redStickHead)"/><path d="M46 92 h13 l-2 -12 h-9 z" fill="url(#redStickHead)"/><text x="52.5" y="124" class="star-mark">✦</text></g>
          <g transform="rotate(-15 66 286)"><rect x="60" y="58" width="13" height="228" rx="2" fill="url(#creamStick)"/><path d="M60 58 h13 v94 h-13 z" fill="url(#redStickHead)"/><path d="M60 58 h13 l-2 -13 h-9 z" fill="url(#redStickHead)"/><text x="66.5" y="94" class="star-mark">✦</text></g>
          <g transform="rotate(-11 80 286)"><rect x="74" y="78" width="13" height="208" rx="2" fill="url(#creamStick)"/><path d="M74 78 h13 v86 h-13 z" fill="url(#redStickHead)"/><path d="M74 78 h13 l-2 -12 h-9 z" fill="url(#redStickHead)"/><text x="80.5" y="111" class="star-mark">✦</text></g>
          <g transform="rotate(-7 94 286)"><rect x="88" y="42" width="13" height="244" rx="2" fill="url(#creamStick)"/><path d="M88 42 h13 v104 h-13 z" fill="url(#redStickHead)"/><path d="M88 42 h13 l-2 -13 h-9 z" fill="url(#redStickHead)"/><text x="94.5" y="82" class="star-mark">✦</text></g>

    <div class="ring-wrap">
      <svg class="ring-svg" width="90" height="90" viewBox="0 0 90 90">
        <circle class="ring-bg" cx="45" cy="45" r="40"/>
        <circle class="ring-track" id="ringTrack" cx="45" cy="45" r="40"/>
      </svg>
      <div class="ring-core">
        <span class="ring-pct" id="ringPct">0%</span>
        <span class="ring-lbl">SHAKE</span>
      </div>
    </div>
    <button class="btn-perm" id="btnPerm" onclick="reqPerm()">🔓 อนุญาตเซ็นเซอร์</button>
    <button class="btn-tap" id="btnTap" onclick="addPower(38)">เขย่า!</button>

<!-- REVEAL -->
<div id="screen-reveal" class="screen">
  <div class="reveal-wrap" id="revealWrap" onclick="openPrize()">
    <div class="big-stick" id="bigStick">
      <div class="bsn" style="top:30%"></div>
      <div class="bsn" style="top:62%"></div>
      <div class="bsc"><span>籤</span></div>
    </div>
    <div class="tap-lbl" id="tapLbl">✨ แตะเพื่อเปิดรางวัล ✨</div>
  </div>
  <div class="prize-card" id="prizeCard">
    <div class="plbl">🎊 คุณได้รับรางวัล 🎊</div>
    <div class="pname" id="prizeName">—</div>
    <div class="psub">ยินดีด้วยนะครับ!</div>
    <button class="btn-again" onclick="playAgain()">🔄 เสี่ยงอีกครั้ง</button>
    <button class="btn-back" onclick="location.href='index.html'">← กลับหน้าหลัก</button>
  </div>
</div>

<script>
const API='https://script.google.com/macros/s/AKfycbw6yuCH7_BlNnATWgHNUyVmo8YiD12br97HZammIoRzmlidAK97S7l93Xs9PJ6pUTVpFg/exec';

(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<55;i++){
    const s=document.createElement('div');s.className='star';
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s`;
    c.appendChild(s);
  }
})();

let rewards=[],power=0,chosen=null,revealed=false;
async function boot(){
  show('loading');
  try{
    const r=await fetch(API);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();
    if(j.status!=='ok'||!j.rewards.length)throw new Error('ไม่พบรางวัลใน Sheet');
    rewards=j.rewards;
    document.getElementById('rewardBadge').textContent=rewards.length+' รางวัล';
    playIntroSound();
    show('shake');
    initMotion();
  }catch(e){
    document.getElementById('errMsg').textContent=e.message;show('error');
  }
}

function pick(){
  const t=rewards.reduce((s,r)=>s+r.percent,0);
  let rnd=Math.random()*t;
  for(const r of rewards){rnd-=r.percent;if(rnd<=0)return r;}
  return rewards[rewards.length-1];
}

function initMotion(){
  if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
    document.getElementById('btnPerm').style.display='block';return;
  }
  if(typeof DeviceMotionEvent!=='undefined'){window.addEventListener('devicemotion',onMotion);}
  else{document.getElementById('btnTap').style.display='block';}
}
function reqPerm(){
  DeviceMotionEvent.requestPermission().then(s=>{
    if(s==='granted'){window.addEventListener('devicemotion',onMotion);document.getElementById('btnPerm').style.display='none';}
  }).catch(()=>{document.getElementById('btnTap').style.display='block';document.getElementById('btnPerm').style.display='none';});
}
let lastA=null,motionWarmup=0,lastShakeTime=0;

function onMotion(e){
  const a=e.accelerationIncludingGravity;
  if(!a)return;
  const cur={x:a.x||0,y:a.y||0,z:a.z||0};
  if(lastA===null){lastA=cur;return;}
  if(motionWarmup<8){motionWarmup++;lastA=cur;return;}
  const now=Date.now();
  if(now-lastShakeTime<180){lastA=cur;return;}
  const f=Math.abs(cur.x-lastA.x)+Math.abs(cur.y-lastA.y)+Math.abs(cur.z-lastA.z);
  lastA=cur;
  if(f>20){const gain=Math.min(6,(f-20)*0.09);addPower(gain);lastShakeTime=now;}
}

let vfxTO=null;
function addPower(f){
  if(power>=100)return;
  power=Math.min(100,power+f);
  updateRing();doVFX();soundHit();
  if(power>=100)setTimeout(flyOut,60);
}

function updateRing(){
  const p=Math.round(power);
  document.getElementById('ringTrack').style.strokeDashoffset=251-251*power/100;
  document.getElementById('ringPct').textContent=p+'%';
  const h=document.getElementById('shakeHint');
  if(power>=85){h.textContent='เกือบแล้ว!!';h.classList.add('lit');}
  else if(power>=45){h.textContent='ดีมาก! เขย่าต่อ!';h.classList.add('lit');}
  else{h.textContent='เขย่ามือถือเพื่อเสี่ยงไม้';h.classList.toggle('lit',power>15);}
}

function doVFX(){
  document.getElementById('cupSvgMain').classList.add('shaking');
  document.getElementById('sticksBunch').classList.add('wobbling');
  clearTimeout(vfxTO);
  vfxTO=setTimeout(()=>{
    document.getElementById('cupSvgMain').classList.remove('shaking');
    document.getElementById('sticksBunch').classList.remove('wobbling');
  },280);
}

function flyOut(){
  const fs=document.getElementById('flyStick');
  fs.style.opacity='1';fs.style.animation='fly-out .95s ease-out forwards';
  soundFly();
  setTimeout(()=>{chosen=pick();revealed=false;showReveal();},960);
}

function showReveal(){
  show('reveal');
  const pc=document.getElementById('prizeCard');
  pc.style.display='none';pc.style.animation='';
  document.getElementById('tapLbl').style.display='block';
  document.getElementById('revealWrap').style.animation='stick-land .65s cubic-bezier(.34,1.56,.64,1) forwards';
}

function openPrize(){
  if(revealed)return;revealed=true;
  document.getElementById('tapLbl').style.display='none';
  const pc=document.getElementById('prizeCard');
  document.getElementById('prizeName').textContent=chosen.reward;
  pc.style.display='block';pc.style.animation='card-up .5s cubic-bezier(.34,1.56,.64,1) forwards';
  soundReveal();confetti();
}

function playAgain(){
  power=0;chosen=null;revealed=false;
  lastA=null;motionWarmup=0;lastShakeTime=0;
  const fs=document.getElementById('flyStick');fs.style.opacity='0';fs.style.animation='';
  document.getElementById('ringTrack').style.strokeDashoffset='251';
  document.getElementById('ringPct').textContent='0%';
  const h=document.getElementById('shakeHint');h.textContent='เขย่ามือถือเพื่อเสี่ยงไม้';h.classList.remove('lit');
  show('shake');
}

function show(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+n).classList.add('active');
}

const CF_C=['#D4A017','#F5C842','#B91C1C','#EF4444','#FFD700','#FFFACD','#FF6B35'];
function confetti(){
  for(let i=0;i<60;i++){
    setTimeout(()=>{
      const el=document.createElement('div');el.className='cf';
      const sz=6+Math.random()*8;
      el.style.cssText=`left:${Math.random()*100}vw;top:-12px;width:${sz}px;height:${sz}px;background:${CF_C[Math.floor(Math.random()*CF_C.length)]};border-radius:${Math.random()>.5?'50%':'2px'};--dur:${1.3+Math.random()}s;--del:${Math.random()*.5}s;`;
      document.body.appendChild(el);setTimeout(()=>el.remove(),3000);
    },i*22);
  }
}

// ── SOUND ENGINE ──
const shakeSound=new Audio("sound/shake.mp3");
const dropSound=new Audio("sound/woodfall.mp3");
const rewardSound=new Audio("sound/reward.mp3");
shakeSound.preload='auto';dropSound.preload='auto';rewardSound.preload='auto';
const shakePool=[new Audio("sound/shake.mp3"),new Audio("sound/shake.mp3"),new Audio("sound/shake.mp3"),new Audio("sound/shake.mp3")];
shakePool.forEach(a=>{a.preload='auto';a.volume=0.85;});
let shakePoolIndex=0,lastHit=0,soundsUnlocked=false;

function unlockOne(a){
  try{const oldVol=a.volume;a.muted=true;a.play().then(()=>{a.pause();a.currentTime=0;a.muted=false;a.volume=oldVol;}).catch(()=>{a.muted=false;a.volume=oldVol;});}catch(e){}
}
function unlockSounds(){
  if(soundsUnlocked)return;soundsUnlocked=true;
  [shakeSound,dropSound,rewardSound,...shakePool].forEach(unlockOne);
}
function playIntroSound(){
  try{rewardSound.pause();rewardSound.currentTime=0;rewardSound.volume=0.35;rewardSound.play().catch(()=>{});}catch(e){}
}
function stopShakeSounds(){shakePool.forEach(a=>{try{a.pause();a.currentTime=0;}catch(e){}});}
function soundHit(){
  try{
    const now=Date.now();if(now-lastHit<80)return;lastHit=now;
    const s=shakePool[shakePoolIndex];shakePoolIndex=(shakePoolIndex+1)%shakePool.length;
    s.pause();s.currentTime=0;s.volume=0.85;s.play().catch(()=>{});
  }catch(e){}
}
function soundFly(){
  try{stopShakeSounds();dropSound.pause();dropSound.currentTime=0;dropSound.volume=0.95;dropSound.play().catch(()=>{});}catch(e){}
}
function soundReveal(){
  try{rewardSound.pause();rewardSound.currentTime=0;rewardSound.volume=0.85;rewardSound.play().catch(()=>{});}catch(e){}
}
document.addEventListener('touchstart', unlockSounds, {once: true});
document.addEventListener('mousedown', unlockSounds, {once: true});
boot();
</script>
</body>
</html>
